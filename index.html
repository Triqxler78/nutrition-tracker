<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition App (OpenRouter Debug)</title>
</head>
<body>

    <h1>Nutrition App (OpenRouter Free v6)</h1>

    <section>
        <h3>1. API Einstellungen</h3>
        <input type="password" id="apiKeyInput" placeholder="OpenRouter Key (sk-or-...)">
        <button onclick="saveApiKey()">Key speichern</button>
    </section>

    <hr>

    <section>
        <h3>2. Tagesübersicht</h3>
        <p>Tagesziel: 2000 kcal</p>
        <p>Konsumiert: <strong id="totalKcal">0</strong> kcal</p>
        <p>Verbleibend: <strong id="remainingKcal">2000</strong> kcal</p>
        <p>Eiweiß: <strong id="totalProtein">0</strong>g | Kohlenhydrate: <strong id="totalCarbs">0</strong>g | Fett: <strong id="totalFett">0</strong>g</p>
        <button onclick="clearDataManually()">Heute manuell zurücksetzen</button>
    </section>

    <hr>

    <section>
        <h3>3. Mahlzeit eingeben</h3>
        <textarea id="mealInput" rows="4" cols="40" placeholder="Z.B.: 1 Ei oder 2 Vollkorntoast"></textarea>
        <br><br>
        <button id="submitBtn" onclick="analyzeMeal()">Mahlzeit analysieren</button>
        <p id="loadingText" style="display:none; color: blue;">OpenRouter KI berechnet... Bitte warten...</p>
    </section>

    <hr>

    <section>
        <h3>4. Heutige Mahlzeiten</h3>
        <ul id="logList"></ul>
    </section>

    <script>
        const DAILY_GOAL = 2000;

        window.onload = function() {
            checkDailyReset();
            loadApiKey();
            updateUI();
        };

        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if(!key) {
                alert("Bitte einen Key eingeben.");
                return;
            }
            localStorage.setItem('openrouter_api_key', key);
            alert('OpenRouter Key gespeichert!');
        }

        function loadApiKey() {
            const key = localStorage.getItem('openrouter_api_key');
            if(key) {
                document.getElementById('apiKeyInput').value = key;
            }
        }

        function checkDailyReset() {
            const todayStr = new Date().toDateString();
            const lastSavedDate = localStorage.getItem('last_saved_date');

            if (lastSavedDate !== todayStr) {
                localStorage.setItem('meal_log', JSON.stringify([]));
                localStorage.setItem('last_saved_date', todayStr);
            }
        }

        function clearDataManually() {
            if(confirm("Wirklich alle heutigen Daten löschen?")) {
                localStorage.setItem('meal_log', JSON.stringify([]));
                updateUI();
            }
        }

        function updateUI() {
            const log = JSON.parse(localStorage.getItem('meal_log')) || [];
            let totalKcal = 0, totalProtein = 0, totalCarbs = 0, totalFett = 0;
            const logList = document.getElementById('logList');
            logList.innerHTML = ''; 

            log.forEach(item => {
                totalKcal += Math.round(Number(item.kcal || 0));
                totalProtein += Number(item.protein || 0);
                totalCarbs += Number(item.carbs || 0);
                totalFett += Number(item.fett || 0);

                const li = document.createElement('li');
                li.innerHTML = `[${item.time}] <b>${item.name}</b>: ${Math.round(item.kcal)} kcal (E:${item.protein.toFixed(1)}g, K:${item.carbs.toFixed(1)}g, F:${item.fett.toFixed(1)}g)`;
                logList.appendChild(li);
            });

            document.getElementById('totalKcal').innerText = totalKcal;
            document.getElementById('remainingKcal').innerText = DAILY_GOAL - totalKcal;
            document.getElementById('totalProtein').innerText = totalProtein.toFixed(1);
            document.getElementById('totalCarbs').innerText = totalCarbs.toFixed(1);
            document.getElementById('totalFett').innerText = totalFett.toFixed(1);
        }

        async function analyzeMeal() {
            const apiKey = localStorage.getItem('openrouter_api_key');
            if(!apiKey) {
                alert("Bitte gib zuerst deinen OpenRouter API Key oben ein und klicke auf Speichern!");
                return;
            }

            const mealText = document.getElementById('mealInput').value.trim();
            if(!mealText) return;

            document.getElementById('loadingText').style.display = 'block';
            document.getElementById('submitBtn').disabled = true;

            const now = new Date();
            const currentTimeStr = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

            const systemPrompt = `Du bist ein hochpräziser Nährwertrechner.
            
            STRIKTE REGELN:
            1. Analysiere NUR die eingegebenen Lebensmittel. Erfinde absolut keine anderen Lebensmittel dazu.
            2. Wenn keine Marke genannt wird, nimm IMMER die Nährwerte der REWE Eigenmarke "ja!". Schreibe "(ja!)" hinter den Namen.
            3. BEISPIEL-WERTE für 1 Ei (Größe M, ca. 55g): 76 kcal, Eiweiß: 6.5g, Kohlenhydrate: 0.5g, Fett: 5.5g.
            4. MATHEMATISCHE KORREKTHEIT: Deine Kalorien MÜSSEN zwingend zu den Makros passen! 
               Formel: (Eiweiß * 4) + (Kohlenhydrate * 4) + (Fett * 9) = kcal.
            
            Antworte AUSSCHLIESSLICH mit einem validen JSON-Objekt in diesem Format, ohne Markdown-Blöcke oder extra Text:
            {
              "items": [
                {"name": "1 Ei (ja!)", "kcal": 76, "protein": 6.5, "carbs": 0.5, "fett": 5.5}
              ]
            }`;

            try {
                // Hier jetzt die offizielle OpenRouter API URL
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        // Ein dauerhaft kostenloses, extrem schlaues 70B-Modell auf OpenRouter
                        model: "meta-llama/llama-3.3-70b-instruct:free",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: mealText }
                        ],
                        temperature: 0.0 
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    alert(`OpenRouter Fehler (Status ${response.status}):\n\n${errorText}`);
                    return;
                }

                const data = await response.json();
                let aiResponseText = data.choices[0].message.content.trim();
                
                // Absicherung gegen eventuelle Markdown-Reste der KI
                aiResponseText = aiResponseText.replace(/```json|```/g, '').trim();
                
                const parsedData = JSON.parse(aiResponseText);
                const parsedItems = parsedData.items || [];

                let currentLog = JSON.parse(localStorage.getItem('meal_log')) || [];

                parsedItems.forEach(item => {
                    item.time = currentTimeStr;
                    currentLog.push(item);
                });

                localStorage.setItem('meal_log', JSON.stringify(currentLog));
                updateUI();
                document.getElementById('mealInput').value = '';

            } catch (error) {
                console.error("Fehler:", error);
                alert("Fehler beim Verarbeiten: " + error.message);
            } finally {
                document.getElementById('loadingText').style.display = 'none';
                document.getElementById('submitBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
