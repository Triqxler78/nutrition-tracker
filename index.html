<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriTrack Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS & Premium Design --- */
        :root {
            --primary: #10B981; 
            --primary-hover: #059669;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --input-bg: #F9FAFB;
            --border-color: #E5E7EB;
            --protein-color: #3B82F6; 
            --carbs-color: #F59E0B;   
            --fat-color: #EF4444;     
            --voice-color: #3B82F6;   
            --voice-hover: #2563EB;
            --edit-bg: #f0fdf4;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Dark Mode Variables */
        body.dark-mode {
            --bg-color: #111827;
            --card-bg: #1F2937;
            --text-main: #F9FAFB;
            --text-muted: #9CA3AF;
            --input-bg: #374151;
            --border-color: #4B5563;
            --edit-bg: #064e3b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
            transition: var(--transition);
        }

        .app-container {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        /* Dark Mode Toggle */
        .theme-toggle {
            position: absolute;
            top: 10px;
            right: 0;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            box-shadow: none;
            width: auto;
            padding: 5px;
        }
        .theme-toggle:hover { background: none; transform: scale(1.1); }

        .header {
            text-align: center;
            padding: 10px 0;
        }
        .header h1 {
            font-weight: 700;
            color: var(--primary);
            font-size: 32px;
            letter-spacing: -0.5px;
        }
        .header p { color: var(--text-muted); font-size: 14px; }

        .card {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            transition: var(--transition);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        input, textarea {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            font-size: 15px;
            background-color: var(--input-bg);
            color: var(--text-main);
            outline: none;
            resize: none;
            transition: var(--transition);
        }
        input:focus, textarea:focus {
            border-color: var(--primary);
            background-color: var(--card-bg);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }
        
        .input-group { margin-bottom: 12px; }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        button:hover { background-color: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(16, 185, 129, 0.2); }
        button:active { transform: translateY(0); }
        button:disabled { background-color: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }

        button.voice-btn {
            background-color: var(--voice-color);
            margin-bottom: 10px;
        }
        button.voice-btn:hover { background-color: var(--voice-hover); box-shadow: 0 6px 12px rgba(59, 130, 246, 0.2); }

        .progress-wrapper { margin: 24px 0; }
        .progress-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        .progress-bar {
            height: 14px;
            background-color: var(--border-color);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 10px;
            width: 0%;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.5s;
        }

        .macros-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        .macro-box {
            background-color: var(--input-bg);
            padding: 16px 12px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }
        .macro-label { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 4px; }
        .macro-value { font-size: 20px; font-weight: 700; }
        .m-protein { color: var(--protein-color); }
        .m-carbs { color: var(--carbs-color); }
        .m-fat { color: var(--fat-color); }

        ul { list-style: none; }
        li {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: fadeIn 0.4s ease-out forwards;
            transition: var(--transition);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .meal-header { display: flex; justify-content: space-between; align-items: center; }
        .meal-time { font-size: 12px; color: var(--text-muted); font-weight: 600; }
        .meal-name { font-weight: 600; font-size: 16px; }
        .meal-kcal { font-weight: 700; color: var(--primary); font-size: 16px; }
        .meal-macros { display: flex; gap: 8px; font-size: 12px; flex-wrap: wrap; }
        .badge { padding: 4px 10px; border-radius: 20px; font-weight: 600; }
        .bg-protein { background-color: rgba(59, 130, 246, 0.1); color: var(--protein-color); }
        .bg-carbs { background-color: rgba(245, 158, 11, 0.1); color: var(--carbs-color); }
        .bg-fat { background-color: rgba(239, 68, 68, 0.1); color: var(--fat-color); }

        .settings-content { 
            display: none; 
            margin-top: 15px; 
            animation: fadeIn 0.3s ease-out;
        }
        .toggle-btn { font-size: 13px; color: var(--primary); cursor: pointer; font-weight: 500; }
        .toggle-btn:hover { text-decoration: underline; }
        .action-icon { cursor: pointer; font-size: 16px; transition: transform 0.2s; background: none; border: none; padding: 5px; box-shadow: none; width: auto; color: var(--text-muted);}
        .action-icon:hover { transform: scale(1.15); background: none; }

        /* Edit Mode Layout */
        .edit-layout {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--edit-bg);
            padding: 16px;
            border-radius: 12px;
            border: 1px dashed var(--primary);
        }
        .edit-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }
        .edit-grid div { display: flex; flex-direction: column; align-items: center; }
        .edit-grid label { font-size: 10px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
        .edit-grid input { padding: 8px 4px; font-size: 12px; text-align: center; border-radius: 8px; }
        .edit-actions { display: flex; gap: 8px; margin-top: 8px; }
        .edit-actions button { padding: 10px; font-size: 13px; border-radius: 10px; }

        /* Toast Notifications */
        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            background-color: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            opacity: 0;
            transform: translateY(20px);
            animation: toastEnter 0.3s forwards, toastLeave 0.3s forwards 2.7s;
        }
        .toast.success { background-color: var(--primary); }
        .toast.error { background-color: var(--fat-color); }
        
        @keyframes toastEnter { to { opacity: 1; transform: translateY(0); } }
        @keyframes toastLeave { to { opacity: 0; transform: translateY(20px); } }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="app-container">
        
        <button class="theme-toggle" onclick="toggleDarkMode()">🌙</button>

        <div class="header">
            <h1>NutriTrack</h1>
            <p>Dein smarter KI-Ernährungscoach</p>
        </div>

        <div class="card">
            <div class="card-title">
                Heutige Übersicht
                <span class="toggle-btn" onclick="toggleSettings()">⚙️ Einstellungen</span>
            </div>
            
            <div id="settingsArea" class="settings-content">
                <div class="input-group">
                    <label style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px; display: block;">Groq Cloud API Key</label>
                    <input type="password" id="apiKeyInput" placeholder="gsk_...">
                </div>
                <div class="input-group">
                    <label style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px; display: block;">Tagesziel (kcal)</label>
                    <input type="number" id="goalInput" placeholder="z.B. 2000">
                </div>
                <button onclick="saveSettings()">Speichern</button>
                <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 20px 0;">
            </div>

            <div class="progress-wrapper">
                <div class="progress-labels">
                    <span><span id="totalKcalDisplay">0</span> kcal konsumiert</span>
                    <span style="color: var(--text-muted);"><span id="remainingKcal">0</span> kcal übrig</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar"></div>
                </div>
            </div>

            <div class="macros-grid">
                <div class="macro-box">
                    <div class="macro-label">Eiweiß</div>
                    <div class="macro-value m-protein"><span id="totalProtein">0</span>g</div>
                </div>
                <div class="macro-box">
                    <div class="macro-label">Kohlenhydrate</div>
                    <div class="macro-value m-carbs"><span id="totalCarbs">0</span>g</div>
                </div>
                <div class="macro-box">
                    <div class="macro-label">Fett</div>
                    <div class="macro-value m-fat"><span id="totalFett">0</span>g</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Mahlzeit tracken</div>
            <textarea id="mealInput" rows="3" placeholder="Z.B.: 1 Apfel, 2 Vollkorntoast und 1 Ei..."></textarea>
            <br><br>
            <button id="micBtn" class="voice-btn" onclick="startVoiceInput()">🎙️ Per Sprache eingeben</button>
            <button id="submitBtn" onclick="analyzeMeal()">
                <div class="spinner" id="btnSpinner"></div>
                <span id="btnText">Smart Scan ✨</span>
            </button>
        </div>

        <div class="card">
            <div class="card-title">
                Verlauf
                <span class="toggle-btn" style="color: var(--fat-color);" onclick="clearDataManually()">Reset</span>
            </div>
            <ul id="logList"></ul>
        </div>

    </div>

    <div id="toast-container"></div>

    <script>
        let DEFAULT_GOAL = 2000;
        let speechRecognitionInstance = null;
        let isDarkMode = false;

        window.onload = function() {
            checkDailyReset();
            loadSettings();
            initDarkMode();
            updateUI();
        };

        // --- UI & UX HELPER ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3000);
        }

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);
            localStorage.setItem('dark_mode', isDarkMode);
            document.querySelector('.theme-toggle').innerText = isDarkMode ? '☀️' : '🌙';
        }

        function initDarkMode() {
            const savedMode = localStorage.getItem('dark_mode');
            if (savedMode === 'true') toggleDarkMode();
        }

        // --- SPRACHEINGABE ---
        function startVoiceInput() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                showToast("Spracherkennung wird nicht unterstützt.", "error");
                return;
            }

            const micBtn = document.getElementById('micBtn');
            const mealInput = document.getElementById('mealInput');

            if (speechRecognitionInstance) {
                speechRecognitionInstance.stop();
                return;
            }

            speechRecognitionInstance = new SpeechRecognition();
            speechRecognitionInstance.lang = 'de-DE';
            speechRecognitionInstance.interimResults = false;

            speechRecognitionInstance.onstart = function() {
                micBtn.innerHTML = "🛑 Aufnehmen... (Klicken zum Stoppen)";
                micBtn.style.backgroundColor = "var(--fat-color)";
            };

            speechRecognitionInstance.onresult = function(event) {
                const spokenText = event.results[0][0].transcript;
                mealInput.value = mealInput.value.trim() ? mealInput.value + " " + spokenText : spokenText;
                showToast("Text erfasst!", "success");
            };

            speechRecognitionInstance.onerror = function(event) {
                if(event.error !== 'no-speech') {
                    showToast("Mikrofon-Fehler: " + event.error, "error");
                }
            };

            speechRecognitionInstance.onend = function() {
                micBtn.innerHTML = "🎙️ Per Sprache eingeben";
                micBtn.style.backgroundColor = "var(--voice-color)";
                speechRecognitionInstance = null;
            };

            speechRecognitionInstance.start();
        }

        // --- BEARBEITEN, LÖSCHEN & SPEICHERN ---
        function toggleEdit(index) {
            const log = JSON.parse(localStorage.getItem('meal_log')) || [];
            log[index].isEditing = !log[index].isEditing;
            localStorage.setItem('meal_log', JSON.stringify(log));
            updateUI();
        }

        function deleteMeal(index) {
            if(confirm("Diesen Eintrag wirklich löschen?")) {
                const log = JSON.parse(localStorage.getItem('meal_log')) || [];
                log.splice(index, 1);
                localStorage.setItem('meal_log', JSON.stringify(log));
                updateUI();
                showToast("Eintrag gelöscht.", "success");
            }
        }

        function saveEdit(index) {
            const log = JSON.parse(localStorage.getItem('meal_log')) || [];
            const item = log[index];

            item.amount = document.getElementById(`editAmount-${index}`).value.trim();
            item.kcal = Math.round(Number(document.getElementById(`editKcal-${index}`).value));
            item.protein = Number(document.getElementById(`editProtein-${index}`).value);
            item.carbs = Number(document.getElementById(`editCarbs-${index}`).value);
            item.fett = Number(document.getElementById(`editFat-${index}`).value);
            item.isEditing = false;

            log[index] = item;
            localStorage.setItem('meal_log', JSON.stringify(log));

            // Dictionary Update
            const dictionary = JSON.parse(localStorage.getItem('food_dictionary')) || {};
            const foodKey = item.name.toLowerCase().trim();
            dictionary[foodKey] = {
                amount: item.amount,
                kcal: item.kcal,
                protein: item.protein,
                carbs: item.carbs,
                fett: item.fett
            };
            localStorage.setItem('food_dictionary', JSON.stringify(dictionary));

            updateUI();
            showToast("Änderungen gespeichert & gemerkt!", "success");
        }

        function updateUI() {
            const log = JSON.parse(localStorage.getItem('meal_log')) || [];
            let totalKcal = 0, totalProtein = 0, totalCarbs = 0, totalFett = 0;
            const logList = document.getElementById('logList');
            logList.innerHTML = ''; 

            if(log.length === 0) {
                logList.innerHTML = '<li style="text-align:center; color:var(--text-muted); justify-content:center;">Noch keine Mahlzeiten erfasst.</li>';
            }

            log.forEach((item, index) => {
                totalKcal += Math.round(Number(item.kcal || 0));
                totalProtein += Number(item.protein || 0);
                totalCarbs += Number(item.carbs || 0);
                totalFett += Number(item.fett || 0);

                const li = document.createElement('li');

                if (item.isEditing) {
                    li.innerHTML = `
                        <div class="edit-layout">
                            <strong style="font-size:14px; color:var(--primary)">${item.name} anpassen:</strong>
                            <div class="edit-grid">
                                <div><label>Menge</label><input type="text" id="editAmount-${index}" value="${item.amount || '100g'}"></div>
                                <div><label>kcal</label><input type="number" id="editKcal-${index}" value="${Math.round(item.kcal)}"></div>
                                <div><label>Eiweiß</label><input type="number" step="0.1" id="editProtein-${index}" value="${item.protein}"></div>
                                <div><label>Kohlenh.</label><input type="number" step="0.1" id="editCarbs-${index}" value="${item.carbs}"></div>
                                <div><label>Fett</label><input type="number" step="0.1" id="editFat-${index}" value="${item.fett}"></div>
                            </div>
                            <div class="edit-actions">
                                <button onclick="saveEdit(${index})">Speichern 💾</button>
                                <button onclick="toggleEdit(${index})" style="background-color: var(--border-color); color: var(--text-main);">Abbrechen</button>
                            </div>
                        </div>
                    `;
                } else {
                    li.innerHTML = `
                        <div class="meal-header">
                            <div style="display: flex; flex-direction: column;">
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <span class="meal-name">${item.name}</span>
                                    <span style="font-size:12px; color:var(--text-muted)">(${item.amount || '1 Port.'})</span>
                                </div>
                                <span class="meal-time">${item.time} Uhr</span>
                            </div>
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <span class="meal-kcal">${Math.round(item.kcal)} kcal</span>
                                <button class="action-icon" onclick="toggleEdit(${index})" title="Bearbeiten">✏️</button>
                                <button class="action-icon" onclick="deleteMeal(${index})" title="Löschen">🗑️</button>
                            </div>
                        </div>
                        <div class="meal-macros">
                            <span class="badge bg-protein">E: ${Number(item.protein).toFixed(1)}g</span>
                            <span class="badge bg-carbs">K: ${Number(item.carbs).toFixed(1)}g</span>
                            <span class="badge bg-fat">F: ${Number(item.fett).toFixed(1)}g</span>
                        </div>
                    `;
                }
                logList.appendChild(li);
            });

            // Update Dashboard Stats
            document.getElementById('totalKcalDisplay').innerText = totalKcal;
            document.getElementById('totalProtein').innerText = totalProtein.toFixed(1);
            document.getElementById('totalCarbs').innerText = totalCarbs.toFixed(1);
            document.getElementById('totalFett').innerText = totalFett.toFixed(1);

            let remaining = DEFAULT_GOAL - totalKcal;
            document.getElementById('remainingKcal').innerText = remaining < 0 ? 0 : remaining;

            let percentage = (totalKcal / DEFAULT_GOAL) * 100;
            if (percentage > 100) percentage = 100;
            
            const progressBar = document.getElementById('progressBar');
            progressBar.style.width = percentage + '%';
            
            if(totalKcal > DEFAULT_GOAL) {
                progressBar.style.backgroundColor = 'var(--fat-color)';
                progressBar.style.boxShadow = '0 0 10px rgba(239, 68, 68, 0.5)';
            } else {
                progressBar.style.backgroundColor = 'var(--primary)';
                progressBar.style.boxShadow = '0 0 10px rgba(16, 185, 129, 0.4)';
            }
        }

        // --- SETTINGS & BASICS ---
        function toggleSettings() {
            const area = document.getElementById('settingsArea');
            area.style.display = area.style.display === 'block' ? 'none' : 'block';
        }

        function saveSettings() {
            const key = document.getElementById('apiKeyInput').value.trim();
            const goal = document.getElementById('goalInput').value.trim();
            if(key) localStorage.setItem('groq_api_key', key);
            if(goal) localStorage.setItem('daily_kcal_goal', goal);
            DEFAULT_GOAL = goal ? parseInt(goal) : 2000;
            toggleSettings();
            updateUI();
            showToast("Einstellungen gespeichert!", "success");
        }

        function loadSettings() {
            const key = localStorage.getItem('groq_api_key');
            const goal = localStorage.getItem('daily_kcal_goal');
            if(key) document.getElementById('apiKeyInput').value = key;
            if(goal) {
                document.getElementById('goalInput').value = goal;
                DEFAULT_GOAL = parseInt(goal);
            }
        }

        function checkDailyReset() {
            const todayStr = new Date().toDateString();
            const lastSavedDate = localStorage.getItem('last_saved_date');
            if (lastSavedDate !== todayStr) {
                localStorage.setItem('meal_log', JSON.stringify([]));
                localStorage.setItem('last_saved_date', todayStr);
            }
        }

        function clearDataManually() {
            if(confirm("Möchtest du die heutigen Einträge wirklich löschen?")) {
                localStorage.setItem('meal_log', JSON.stringify([]));
                updateUI();
                showToast("Verlauf zurückgesetzt.", "success");
            }
        }

        // --- GROQ KI LOGIK ---
        async function analyzeMeal() {
            const apiKey = localStorage.getItem('groq_api_key');
            if(!apiKey) {
                showToast("Bitte hinterlege deinen GROQ API Key in den Einstellungen!", "error");
                toggleSettings();
                return;
            }

            const mealInput = document.getElementById('mealInput');
            const mealText = mealInput.value.trim();
            if(!mealText) return;

            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('btnSpinner');
            
            // Set Loading State
            btn.disabled = true;
            mealInput.disabled = true;
            btnText.innerText = "Analysiere...";
            spinner.style.display = "block";

            const now = new Date();
            const currentTimeStr = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
            const customDictionary = localStorage.getItem('food_dictionary') || '{}';

            const systemPrompt = `Du bist ein präziser Daten-Extraktor für Lebensmittel. Extrahiere alle Lebensmittel und schätze deren Nährwerte basierend auf der Menge.
Wenn ein Lebensmittel in diesem Dictionary vorkommt, nutze es als Basis und skaliere per Dreisatz: ${customDictionary}
Allgemeine Regeln:
1. Nutze Standardwerte (z.B. Supermarkt-Eigenmarken) wenn keine Marke genannt wird.
2. Berechne Nährwerte proportional für die gesamte genannte Menge (NICHT pro 100g).
Gib ausschließlich ein JSON-Objekt im folgenden Format zurück:
{ "items": [ { "name": "Magerquark", "amount": "250g", "kcal": 170, "protein": 30, "carbs": 10, "fett": 1 } ] }`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant", // Geupdatet auf ein stabiles Groq JSON-Modell
                        response_format: { "type": "json_object" }, 
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: mealText }
                        ],
                        temperature: 0.1 
                    })
                });

                if (!response.ok) {
                    throw new Error(`API Fehler Status: ${response.status}`);
                }

                const data = await response.json();
                const parsedData = JSON.parse(data.choices[0].message.content.trim());
                const parsedItems = parsedData.items || [];

                let currentLog = JSON.parse(localStorage.getItem('meal_log')) || [];

                parsedItems.forEach(item => {
                    item.time = currentTimeStr;
                    item.isEditing = false;
                    currentLog.push(item);
                });

                localStorage.setItem('meal_log', JSON.stringify(currentLog));
                updateUI();
                mealInput.value = '';
                showToast("Mahlzeit erfolgreich getrackt!", "success");

            } catch (error) {
                console.error("Fehler:", error);
                showToast("Fehler bei der KI-Analyse. Prüfe deinen API Key.", "error");
            } finally {
                // Reset Loading State
                btn.disabled = false;
                mealInput.disabled = false;
                btnText.innerText = "Smart Scan ✨";
                spinner.style.display = "none";
                mealInput.focus();
            }
        }
    </script>
