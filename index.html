<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NutriTrack Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        /* ============================================
           NutriTrack Premium — Design System
           ============================================ */
        :root {
            --bg: #f2f3f7;
            --surface: #ffffff;
            --surface-2: #f7f8fa;
            --surface-elevated: #ffffff;
            --text: #1c1c1e;
            --text-secondary: #6b6f76;
            --text-tertiary: #9a9ea6;
            --border: rgba(0, 0, 0, 0.06);
            --separator: rgba(0, 0, 0, 0.05);

            --accent: #007aff;
            --carbs: #ff9f0a;     /* helles Orange */
            --protein: #34c759;   /* sattes Grün */
            --fat: #ff375f;        /* Rot / Pink */
            --danger: #ff3b30;

            --carbs-soft: rgba(255, 159, 10, 0.14);
            --protein-soft: rgba(52, 199, 89, 0.14);
            --fat-soft: rgba(255, 55, 95, 0.14);

            --ring-track: #e9ebf0;
            --ring-progress: #34c759;

            --radius-lg: 26px;
            --radius-md: 18px;
            --radius-sm: 13px;

            --shadow-sm: 0 1px 2px rgba(16, 24, 40, 0.04), 0 1px 3px rgba(16, 24, 40, 0.06);
            --shadow-md: 0 4px 16px rgba(16, 24, 40, 0.06), 0 2px 6px rgba(16, 24, 40, 0.04);
            --shadow-lg: 0 18px 50px rgba(16, 24, 40, 0.12);

            --font-display: 'Poppins', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-body: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;

            --ease: cubic-bezier(0.4, 0.0, 0.2, 1);
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --surface: #1c1c1e;
                --surface-2: #2c2c2e;
                --surface-elevated: #2c2c2e;
                --text: #f5f5f7;
                --text-secondary: #a1a1aa;
                --text-tertiary: #6e6e73;
                --border: rgba(255, 255, 255, 0.08);
                --separator: rgba(255, 255, 255, 0.07);

                --ring-track: #2c2c2e;

                --carbs-soft: rgba(255, 159, 10, 0.18);
                --protein-soft: rgba(52, 199, 89, 0.18);
                --fat-soft: rgba(255, 55, 95, 0.18);

                --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
                --shadow-md: 0 4px 18px rgba(0, 0, 0, 0.45);
                --shadow-lg: 0 20px 55px rgba(0, 0, 0, 0.6);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html { background: var(--bg); }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            padding-bottom: env(safe-area-inset-bottom);
        }

        h1, h2, .stat-value, .progress-text-center .number, .meal-slot-kcal-badge {
            font-family: var(--font-display);
            letter-spacing: -0.02em;
        }

        /* ---------- App Shell (Mobile First / Centered) ---------- */
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 16px calc(40px + env(safe-area-inset-bottom));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 18px;
            animation: appFade 0.5s var(--ease) both;
        }
        @media (min-width: 481px) {
            body { padding: 24px 0; }
            .app-container {
                min-height: auto;
                background: var(--surface);
                border-radius: 32px;
                box-shadow: var(--shadow-lg);
                margin-top: 24px;
                margin-bottom: 24px;
                padding-top: 26px;
            }
        }
        @keyframes appFade {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ---------- Header ---------- */
        .header-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 4px 4px 0;
        }
        .header-nav h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
        }
        .top-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .date-switcher {
            display: flex;
            align-items: center;
            gap: 2px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 4px;
            box-shadow: var(--shadow-sm);
        }
        .date-btn {
            border: none;
            background: transparent;
            color: var(--text-secondary);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 0.8rem;
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: background 0.2s var(--ease), color 0.2s var(--ease), transform 0.15s var(--ease);
        }
        .date-btn:hover { background: var(--surface-2); color: var(--text); }
        .date-btn:active { transform: scale(0.88); }
        .date-display {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            min-width: 64px;
            text-align: center;
        }
        .icon-btn {
            border: none;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 1rem;
            cursor: pointer;
            display: grid;
            place-items: center;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s var(--spring), color 0.2s var(--ease), background 0.2s var(--ease);
        }
        .icon-btn:hover { color: var(--text); background: var(--surface-2); }
        .icon-btn:active { transform: scale(0.9) rotate(-15deg); }

        /* ---------- Cards ---------- */
        .dashboard-card,
        .tracker-card,
        .meal-slot-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 22px 20px;
        }

        /* ---------- Dashboard / Progress Ring ---------- */
        .main-stats-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 8px;
        }
        .stat-column { text-align: center; }
        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.1;
        }
        #totalVerbrannt { cursor: pointer; transition: transform 0.15s var(--spring); }
        #totalVerbrannt:active { transform: scale(0.92); }
        .stat-label {
            font-size: 0.78rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .stat-label .fa-plus-circle { color: var(--accent); font-size: 0.85rem; }

        .progress-ring-container {
            position: relative;
            width: 150px;
            height: 150px;
            display: grid;
            place-items: center;
        }
        .progress-ring-container svg {
            transform: rotate(-90deg);
            overflow: visible;
        }
        .progress-ring-container svg circle:first-of-type {
            color: var(--ring-track);
        }
        .progress-ring-circle {
            color: var(--ring-progress);
            transition: stroke-dashoffset 1s var(--ease);
            filter: drop-shadow(0 2px 6px rgba(52, 199, 89, 0.35));
            animation: ringGrow 1.1s var(--ease) both;
        }
        @keyframes ringGrow {
            from { stroke-dashoffset: 402.12; }
        }
        .progress-text-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            pointer-events: none;
        }
        .progress-text-center .number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }
        .progress-text-center .label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .progress-text-center .label.over-goal {
            color: var(--fat);
            font-weight: 600;
        }

        /* ---------- Macro Bars ---------- */
        .macro-bars-container {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--separator);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .macro-bar-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 7px;
        }
        .macro-name { font-size: 0.85rem; font-weight: 600; color: var(--text); }
        .macro-numbers { font-size: 0.8rem; color: var(--text-secondary); font-weight: 500; }
        .macro-progress-bg {
            height: 9px;
            background: var(--surface-2);
            border-radius: 999px;
            overflow: hidden;
        }
        .macro-progress-fill {
            height: 100%;
            width: 0;
            border-radius: 999px;
            transition: width 0.9s var(--ease);
        }
        /* Farbzuordnung: Reihenfolge KH / Eiweiß / Fett */
        .macro-bar-row:nth-child(1) .macro-progress-fill { background: linear-gradient(90deg, #ffb340, var(--carbs)); }
        .macro-bar-row:nth-child(1) .macro-name { color: var(--carbs); }
        .macro-bar-row:nth-child(2) .macro-progress-fill { background: linear-gradient(90deg, #5cd97a, var(--protein)); }
        .macro-bar-row:nth-child(2) .macro-name { color: var(--protein); }
        .macro-bar-row:nth-child(3) .macro-progress-fill { background: linear-gradient(90deg, #ff6285, var(--fat)); }
        .macro-bar-row:nth-child(3) .macro-name { color: var(--fat); }

        /* ---------- Tracker Card ---------- */
        .section-title-ios {
            font-family: var(--font-display);
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .section-title-ios .fa-sparkles { color: var(--accent); }
        .time-input-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .time-input-container label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        input[type="time"], input[type="number"], input[type="password"], input[type="text"], textarea {
            font-family: var(--font-body);
            font-size: 0.95rem;
            color: var(--text);
            background: var(--surface-2);
            border: 1.5px solid transparent;
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s var(--ease), background 0.2s var(--ease), box-shadow 0.2s var(--ease);
            -webkit-appearance: none;
            appearance: none;
        }
        input[type="time"] { width: auto; flex: 1; }
        input:focus, textarea:focus {
            border-color: var(--accent);
            background: var(--surface);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.12);
        }
        textarea {
            resize: vertical;
            min-height: 78px;
            line-height: 1.5;
        }
        ::placeholder { color: var(--text-tertiary); }
        .action-row { margin-top: 14px; }

        /* ---------- Buttons ---------- */
        .btn-ios {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            padding: 14px 18px;
            width: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            box-shadow: 0 6px 16px rgba(0, 122, 255, 0.28);
            transition: transform 0.18s var(--spring), box-shadow 0.25s var(--ease), opacity 0.2s var(--ease), filter 0.2s var(--ease);
        }
        .btn-ios:hover { filter: brightness(1.06); box-shadow: 0 8px 22px rgba(0, 122, 255, 0.36); }
        .btn-ios:active { transform: scale(0.96); }
        .btn-ios:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        #submitBtn {
            background: linear-gradient(135deg, #34c759, #00b894);
            box-shadow: 0 6px 16px rgba(52, 199, 89, 0.3);
        }
        #submitBtn:hover { box-shadow: 0 8px 22px rgba(52, 199, 89, 0.4); }
        .btn-save { background: var(--protein); box-shadow: 0 6px 16px rgba(52, 199, 89, 0.3); margin-top: 6px; }
        .btn-danger {
            background: transparent;
            color: var(--danger);
            box-shadow: none;
            border: 1.5px solid var(--separator);
            margin-top: 10px;
        }
        .btn-danger:hover { background: var(--fat-soft); filter: none; box-shadow: none; }

        /* ---------- Meal Slot / Timeline ---------- */
        .slots-container { display: flex; flex-direction: column; gap: 16px; }
        .meal-slot-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .meal-slot-header-left { display: flex; align-items: center; gap: 12px; }
        .meal-slot-icon-wrapper {
            width: 42px;
            height: 42px;
            border-radius: 13px;
            background: var(--protein-soft);
            color: var(--protein);
            display: grid;
            place-items: center;
            font-size: 1.05rem;
            flex-shrink: 0;
        }
        .meal-slot-title { font-size: 1rem; font-weight: 600; color: var(--text); }
        .meal-slot-subtitle { font-size: 0.8rem; color: var(--text-secondary); margin-top: 2px; }
        .meal-slot-kcal-badge {
            background: var(--surface-2);
            color: var(--text);
            font-size: 0.85rem;
            font-weight: 600;
            padding: 7px 13px;
            border-radius: 999px;
            white-space: nowrap;
        }
        .meal-slot-content { display: flex; flex-direction: column; }
        .meal-slot-content:not(:empty) {
            margin-top: 16px;
            padding-top: 6px;
            border-top: 1px solid var(--separator);
        }
        .empty-slot-text {
            text-align: center;
            color: var(--text-tertiary);
            font-size: 0.88rem;
            padding: 22px 0 8px;
        }

        /* ---------- Food Item Row ---------- */
        .food-item-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid var(--separator);
            animation: rowIn 0.4s var(--ease) both;
        }
        .food-item-row:last-child { border-bottom: none; }
        @keyframes rowIn {
            from { opacity: 0; transform: translateX(-8px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .food-time {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--surface-2);
            padding: 4px 8px;
            border-radius: 8px;
            min-width: 48px;
            text-align: center;
            flex-shrink: 0;
        }
        .food-details { flex: 1; min-width: 0; }
        .food-title {
            font-size: 0.94rem;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .food-subinfo {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 5px;
            font-size: 0.74rem;
            color: var(--text-secondary);
            margin-top: 3px;
        }
        .food-row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
        .food-kcal { font-size: 0.9rem; font-weight: 700; color: var(--text); }
        .food-actions { display: flex; gap: 12px; }
        .food-action-icon {
            font-size: 0.85rem;
            color: var(--text-tertiary);
            cursor: pointer;
            transition: color 0.2s var(--ease), transform 0.15s var(--spring);
        }
        .food-action-icon:active { transform: scale(0.85); }
        .food-action-icon.edit:hover { color: var(--accent); }
        .food-action-icon.delete:hover { color: var(--danger); }

        /* ---------- Inline Edit ---------- */
        .inline-edit-box {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px;
            margin: 10px 0;
            animation: rowIn 0.3s var(--ease) both;
        }
        .edit-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 12px;
        }
        .edit-title .fa-edit { color: var(--accent); }
        .edit-time-input { margin-bottom: 10px; }
        .inline-edit-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }
        .inline-edit-grid input { padding: 10px; font-size: 0.85rem; text-align: center; }
        .edit-actions { display: flex; gap: 10px; margin-top: 6px; }
        .edit-actions .btn-ios { padding: 11px; }
        .btn-confirm { background: var(--protein); box-shadow: none; }
        .btn-cancel { background: var(--text-tertiary); box-shadow: none; }

        /* ---------- Settings Modal ---------- */
        .settings-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s var(--ease), visibility 0.3s var(--ease);
            z-index: 100;
        }
        @media (min-width: 481px) { .settings-overlay { align-items: center; } }
        .settings-overlay.show { opacity: 1; visibility: visible; }
        .settings-sheet {
            background: var(--surface);
            width: 100%;
            max-width: 480px;
            border-radius: 28px 28px 0 0;
            padding: 22px 20px calc(28px + env(safe-area-inset-bottom));
            box-shadow: var(--shadow-lg);
            transform: translateY(100%);
            transition: transform 0.4s var(--spring);
            max-height: 92vh;
            overflow-y: auto;
        }
        @media (min-width: 481px) {
            .settings-sheet { border-radius: 28px; transform: translateY(20px) scale(0.96); }
        }
        .settings-overlay.show .settings-sheet { transform: translateY(0) scale(1); }
        .settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
        }
        .settings-header h2 { font-size: 1.4rem; font-weight: 700; color: var(--text); }
        .input-group-ios { margin-bottom: 18px; }
        .input-group-ios > label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .macro-inputs-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .macro-inputs-row input { text-align: center; }
        #macroWarning {
            color: var(--danger);
            font-size: 0.8rem;
            font-weight: 500;
            margin-top: 8px;
            padding: 8px 12px;
            background: var(--fat-soft);
            border-radius: 10px;
        }

        /* ---------- Scrollbar ---------- */
        .settings-sheet::-webkit-scrollbar { width: 8px; }
        .settings-sheet::-webkit-scrollbar-thumb { background: var(--separator); border-radius: 999px; }

        @media (prefers-reduced-motion: reduce) {
            *, .progress-ring-circle, .macro-progress-fill {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
    </head>
<body>

    <div class="app-container">
        
        <div class="header-nav">
            <h1>Heute</h1>
            <div class="top-actions">
                <div class="date-switcher">
                    <button class="date-btn" onclick="changeDate(-1)"><i class="fas fa-chevron-left"></i></button>
                    <span class="date-display" id="dateLabel">15. Juni</span>
                    <button class="date-btn" onclick="changeDate(1)"><i class="fas fa-chevron-right"></i></button>
                </div>
                <button class="icon-btn" onclick="openSettings()"><i class="fas fa-cog"></i></button>
            </div>
        </div>

        <div class="dashboard-card">
            <div class="main-stats-grid">
                <div class="stat-column">
                    <div class="stat-value" id="totalGegessen">0</div>
                    <div class="stat-label">Gegessen</div>
                </div>
                
                <div class="progress-ring-container">
                    <svg width="150" height="150">
                        <circle stroke="currentColor" stroke-width="10" fill="transparent" r="64" cx="75" cy="75"/>
                        <circle class="progress-ring-circle" id="progressCircle" stroke="currentColor" stroke-width="10" stroke-linecap="round" fill="transparent" r="64" cx="75" cy="75" stroke-dasharray="402.12" stroke-dashoffset="402.12"/>
                    </svg>
                    <div class="progress-text-center">
                        <span class="number" id="totalUebrig">2000</span>
                        <span class="label">Übrig</span>
                    </div>
                </div>

                <div class="stat-column">
                    <div class="stat-value" id="totalVerbrannt" onclick="promptBurnedCalories()">0</div>
                    <div class="stat-label">Verbrannt <i class="fas fa-plus-circle"></i></div>
                </div>
            </div>

            <div class="macro-bars-container">
                <div class="macro-bar-row">
                    <div class="macro-bar-header">
                        <span class="macro-name">Kohlenhydrate</span>
                        <span class="macro-numbers"><span id="macroCarbsCurrent">0</span> / <span id="macroCarbsTarget">250</span> g</span>
                    </div>
                    <div class="macro-progress-bg">
                        <div class="macro-progress-fill" id="barCarbs"></div>
                    </div>
                </div>
                <div class="macro-bar-row">
                    <div class="macro-bar-header">
                        <span class="macro-name">Eiweiß</span>
                        <span class="macro-numbers"><span id="macroProteinCurrent">0</span> / <span id="macroProteinTarget">120</span> g</span>
                    </div>
                    <div class="macro-progress-bg">
                        <div class="macro-progress-fill" id="barProtein"></div>
                    </div>
                </div>
                <div class="macro-bar-row">
                    <div class="macro-bar-header">
                        <span class="macro-name">Fett</span>
                        <span class="macro-numbers"><span id="macroFatCurrent">0</span> / <span id="macroFatTarget">65</span> g</span>
                    </div>
                    <div class="macro-progress-bg">
                        <div class="macro-progress-fill" id="barFat"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tracker-card">
            <div class="section-title-ios"><i class="fas fa-sparkles"></i> Mahlzeit tracken</div>
            
            <div class="time-input-container">
                <label for="mealTimeInput">Uhrzeit:</label>
                <input type="time" id="mealTimeInput">
            </div>

            <textarea id="mealInput" rows="3" placeholder="Z.B. 1 Banane, 50g Haferflocken und 200ml Milch..."></textarea>
            
            <div class="action-row">
                <button id="submitBtn" class="btn-ios" onclick="analyzeMeal()">
                    <i class="fas fa-bolt"></i> Smart Scan
                </button>
            </div>
        </div>

        <div class="slots-container">
            <div class="meal-slot-card" id="slotCard-Timeline">
                <div class="meal-slot-header">
                    <div class="meal-slot-header-left">
                        <div class="meal-slot-icon-wrapper"><i class="fas fa-list-ul"></i></div>
                        <div>
                            <div class="meal-slot-title">Tagesverlauf</div>
                            <div class="meal-slot-subtitle" id="slotSub-Timeline">Keine Einträge</div>
                        </div>
                    </div>
                    <div class="meal-slot-header-right">
                        <div class="meal-slot-kcal-badge"><span id="slotKcal-Timeline">0</span> kcal</div>
                    </div>
                </div>
                <div class="meal-slot-content" id="slotContent-Timeline"></div>
            </div>
        </div>

    </div>

    <div class="settings-overlay" id="settingsOverlay" onclick="closeSettings()">
        <div class="settings-sheet" onclick="event.stopPropagation()">
            <div class="settings-header">
                <h2>Einstellungen</h2>
                <button class="icon-btn" onclick="closeSettings()"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="input-group-ios">
                <label>🔑 Groq Cloud API Key</label>
                <input type="password" id="apiKeyInput" placeholder="gsk_...">
            </div>
            <div class="input-group-ios">
                <label>🎯 Tagesziel (kcal)</label>
                <input type="number" id="goalInput" placeholder="z.B. 2000" min="500" max="5000">
            </div>

            <div class="input-group-ios">
                <label>⚖️ Makro-Verteilung (%)</label>
                <div class="macro-inputs-row">
                    <input type="number" id="pctCarbs" placeholder="KH %" title="Kohlenhydrate (%)" min="0" max="100">
                    <input type="number" id="pctProtein" placeholder="P %" title="Protein (%)" min="0" max="100">
                    <input type="number" id="pctFat" placeholder="F %" title="Fett (%)" min="0" max="100">
                </div>
                <div id="macroWarning" style="display: none;">Die Summe der Makros muss 100% ergeben.</div>
            </div>

            <button class="btn-ios btn-save" onclick="saveSettings()">
                <i class="fas fa-check-circle"></i> Speichern & Schließen
            </button>
            
            <button class="btn-ios btn-danger" onclick="clearAllData()">
                <i class="fas fa-trash-alt"></i> Alle lokalen Daten löschen
            </button>
        </div>
    </div>

    <script>
        let DEFAULT_GOAL = 2000;
        let MACRO_CARBS = 50;
        let MACRO_PROTEIN = 25;
        let MACRO_FAT = 25;
        let viewedDate = new Date(); 

        window.onload = function() {
            migrateOldSchema();
            loadSettings();
            document.getElementById('mealTimeInput').value = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
            updateUI();
        };

        function getFormattedDateKey(dateObj) {
            return dateObj.toISOString().split('T')[0];
        }

        function getHumanReadableDateLabel(dateObj) {
            const today = new Date();
            const yesterday = new Date();
            yesterday.setDate(today.getDate() - 1);
            
            if (getFormattedDateKey(dateObj) === getFormattedDateKey(today)) return 'Heute';
            if (getFormattedDateKey(dateObj) === getFormattedDateKey(yesterday)) return 'Gestern';
            
            return dateObj.toLocaleDateString('de-DE', { day: 'numeric', month: 'short' });
        }

        function changeDate(daysOffset) {
            viewedDate.setDate(viewedDate.getDate() + daysOffset);
            updateUI();
        }

        function migrateOldSchema() {
            const oldLog = localStorage.getItem('meal_log');
            if (oldLog) {
                try {
                    const parsed = JSON.parse(oldLog);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        const todayKey = getFormattedDateKey(new Date());
                        let database = JSON.parse(localStorage.getItem('meal_log_v2')) || {};
                        if (!database[todayKey]) database[todayKey] = { meals: [], burned: 0 };
                        
                        parsed.forEach(item => {
                            if (!item.time) item.time = "12:00"; 
                            database[todayKey].meals.push(item);
                        });
                        localStorage.setItem('meal_log_v2', JSON.stringify(database));
                    }
                    localStorage.removeItem('meal_log');
                } catch(e) { console.error("Migration error:", e); }
            }
        }

        function getDayData() {
            const dateKey = getFormattedDateKey(viewedDate);
            let database = JSON.parse(localStorage.getItem('meal_log_v2')) || {};
            if (!database[dateKey]) {
                database[dateKey] = { meals: [], burned: 0 };
            }
            return database[dateKey];
        }

        function saveDayData(dayDataObj) {
            const dateKey = getFormattedDateKey(viewedDate);
            let database = JSON.parse(localStorage.getItem('meal_log_v2')) || {};
            database[dateKey] = dayDataObj;
            localStorage.setItem('meal_log_v2', JSON.stringify(database));
        }

        function promptBurnedCalories() {
            const currentData = getDayData();
            const val = prompt("Verbrannte Kalorien (Aktivitäten/Sport) hinzufügen:", currentData.burned || 0);
            if (val !== null) {
                const parsedNum = Math.max(0, parseInt(val) || 0);
                currentData.burned = parsedNum;
                saveDayData(currentData);
                updateUI();
            }
        }

        function updateUI() {
            const dayData = getDayData();
            const meals = dayData.meals || [];
            const burned = dayData.burned || 0;
            
            const dateKey = getFormattedDateKey(viewedDate);
            document.getElementById('dateLabel').innerText = getHumanReadableDateLabel(viewedDate);
            document.querySelector('.header-nav h1').innerText = getHumanReadableDateLabel(viewedDate);

            const targetCarbs = Math.round((DEFAULT_GOAL * (MACRO_CARBS / 100)) / 4);
            const targetProtein = Math.round((DEFAULT_GOAL * (MACRO_PROTEIN / 100)) / 4);
            const targetFat = Math.round((DEFAULT_GOAL * (MACRO_FAT / 100)) / 9);

            document.getElementById('macroCarbsTarget').innerText = targetCarbs;
            document.getElementById('macroProteinTarget').innerText = targetProtein;
            document.getElementById('macroFatTarget').innerText = targetFat;

            let aggregateKcal = 0, aggregateProtein = 0, aggregateCarbs = 0, aggregateFat = 0;
            let htmlContent = '';

            meals.sort((a, b) => {
                const timeA = a.time || '00:00';
                const timeB = b.time || '00:00';
                return timeA.localeCompare(timeB);
            });

            meals.forEach((item, index) => {
                const itemKcal = Math.round(Number(item.kcal || 0));
                const itemProtein = Number(item.protein || 0);
                const itemCarbs = Number(item.carbs || 0);
                const itemFat = Number(item.fett || 0);

                aggregateKcal += itemKcal;
                aggregateProtein += itemProtein;
                aggregateCarbs += itemCarbs;
                aggregateFat += itemFat;

                if (item.isEditing) {
                    htmlContent += `
                        <div class="inline-edit-box" onclick="event.stopPropagation()">
                            <div class="edit-title"><i class="fas fa-edit"></i> ${item.name} bearbeiten</div>
                            <input type="time" class="edit-time-input" id="editTime-${index}" value="${item.time || ''}">
                            <div class="inline-edit-grid">
                                <input type="text" id="editAmount-${index}" value="${item.amount || '100g'}" placeholder="Menge">
                                <input type="number" id="editKcal-${index}" value="${itemKcal}" placeholder="kcal">
                                <input type="number" step="0.1" id="editProt-${index}" value="${itemProtein}" placeholder="P">
                            </div>
                            <div class="inline-edit-grid">
                                <input type="number" step="0.1" id="editCarb-${index}" value="${itemCarbs}" placeholder="KH">
                                <input type="number" step="0.1" id="editFat-${index}" value="${itemFat}" placeholder="F">
                            </div>
                            <div class="edit-actions">
                                <button class="btn-ios btn-confirm" onclick="saveItemInline(${index})"><i class="fas fa-check"></i></button>
                                <button class="btn-ios btn-cancel" onclick="toggleEditMode(${index})"><i class="fas fa-times"></i></button>
                            </div>
                        </div>
                    `;
                } else {
                    htmlContent += `
                        <div class="food-item-row" onclick="event.stopPropagation()">
                            <div class="food-time">${item.time || '--:--'}</div>
                            <div class="food-details">
                                <div class="food-title">${item.name}</div>
                                <div class="food-subinfo">
                                    <span>${item.amount || '1 Portion'}</span>
                                    <span>•</span>
                                    <span>E: ${itemProtein.toFixed(1)}g KH: ${itemCarbs.toFixed(1)}g F: ${itemFat.toFixed(1)}g</span>
                                </div>
                            </div>
                            <div class="food-row-right">
                                <div class="food-kcal">${itemKcal} kcal</div>
                                <div class="food-actions">
                                    <i class="fas fa-pencil food-action-icon edit" title="Bearbeiten" onclick="toggleEditMode(${index})"></i>
                                    <i class="fas fa-trash food-action-icon delete" title="Löschen" onclick="deleteItemRow(${index})"></i>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });

            document.getElementById('slotKcal-Timeline').innerText = aggregateKcal;
            document.getElementById('slotSub-Timeline').innerText = meals.length === 1 ? '1 Eintrag' : `${meals.length} Einträge`;
            
            const container = document.getElementById('slotContent-Timeline');
            if (meals.length === 0) {
                container.innerHTML = `<div class="empty-slot-text">Keine Einträge für heute</div>`;
            } else {
                container.innerHTML = htmlContent;
            }

            document.getElementById('totalGegessen').innerText = aggregateKcal;
            document.getElementById('totalVerbrannt').innerText = burned;

            let remainingKcal = DEFAULT_GOAL - aggregateKcal + burned;
            const remainingDisplayElement = document.getElementById('totalUebrig');
            remainingDisplayElement.innerText = Math.abs(remainingKcal);
            
            const labelElement = document.querySelector('.progress-text-center .label');
            if (remainingKcal < 0) {
                labelElement.innerText = 'Über Ziel';
                labelElement.classList.add('over-goal');
            } else {
                labelElement.innerText = 'Übrig';
                labelElement.classList.remove('over-goal');
            }

            let progressPercent = aggregateKcal / (DEFAULT_GOAL + burned);
            if (isNaN(progressPercent) || progressPercent < 0) progressPercent = 0;
            if (progressPercent > 1) progressPercent = 1;

            const circleElement = document.getElementById('progressCircle');
            if (circleElement) {
                const radius = circleElement.r.baseVal.value;
                const circumference = 2 * Math.PI * radius;
                const strokeDashoffset = circumference - (progressPercent * circumference);
                circleElement.style.strokeDashoffset = strokeDashoffset;
            }

            document.getElementById('macroCarbsCurrent').innerText = aggregateCarbs.toFixed(1);
            document.getElementById('macroProteinCurrent').innerText = aggregateProtein.toFixed(1);
            document.getElementById('macroFatCurrent').innerText = aggregateFat.toFixed(1);

            document.getElementById('barCarbs').style.width = Math.min(100, (aggregateCarbs / targetCarbs) * 100) + '%';
            document.getElementById('barProtein').style.width = Math.min(100, (aggregateProtein / targetProtein) * 100) + '%';
            document.getElementById('barFat').style.width = Math.min(100, (aggregateFat / targetFat) * 100) + '%';
        }

        function toggleEditMode(index) {
            const dayData = getDayData();
            dayData.meals[index].isEditing = !dayData.meals[index].isEditing;
            saveDayData(dayData);
            updateUI();
        }

        function saveItemInline(index) {
            const dayData = getDayData();
            const item = dayData.meals[index];

            const tm = document.getElementById(`editTime-${index}`)?.value || item.time;
            const amt = document.getElementById(`editAmount-${index}`)?.value.trim() || item.amount;
            const kc = Math.round(Number(document.getElementById(`editKcal-${index}`)?.value || item.kcal));
            const pr = Number(document.getElementById(`editProt-${index}`)?.value || item.protein);
            const cb = Number(document.getElementById(`editCarb-${index}`)?.value || item.carbs);
            const ft = Number(document.getElementById(`editFat-${index}`)?.value || item.fett);

            item.time = tm;
            item.amount = amt;
            item.kcal = kc;
            item.protein = pr;
            item.carbs = cb;
            item.fett = ft;
            item.isEditing = false;

            dayData.meals[index] = item;
            saveDayData(dayData);

            const dictionary = JSON.parse(localStorage.getItem('food_dictionary')) || {};
            dictionary[item.name.toLowerCase().trim()] = { amount: amt, kcal: kc, protein: pr, carbs: cb, fett: ft };
            localStorage.setItem('food_dictionary', JSON.stringify(dictionary));

            updateUI();
        }

        function deleteItemRow(index) {
            const dayData = getDayData();
            if (confirm(`"${dayData.meals[index].name}" wirklich entfernen?`)) {
                dayData.meals.splice(index, 1);
                saveDayData(dayData);
                updateUI();
            }
        }

        function openSettings() {
            document.getElementById('settingsOverlay').classList.add('show');
        }

        function closeSettings() {
            document.getElementById('settingsOverlay').classList.remove('show');
        }

        function saveSettings() {
            const key = document.getElementById('apiKeyInput').value.trim();
            const goal = document.getElementById('goalInput').value.trim();
            
            const pCarbs = parseInt(document.getElementById('pctCarbs').value) || 0;
            const pProt = parseInt(document.getElementById('pctProtein').value) || 0;
            const pFat = parseInt(document.getElementById('pctFat').value) || 0;

            if (pCarbs + pProt + pFat !== 100) {
                document.getElementById('macroWarning').style.display = 'block';
                return; 
            }
            document.getElementById('macroWarning').style.display = 'none';

            if(key) localStorage.setItem('groq_api_key', key);
            if(goal) {
                localStorage.setItem('daily_kcal_goal', goal);
                DEFAULT_GOAL = ********
            }
            
            localStorage.setItem('macro_pct_carbs', pCarbs);
            localStorage.setItem('macro_pct_protein', pProt);
            localStorage.setItem('macro_pct_fat', pFat);
            
            MACRO_CARBS = ********
            MACRO_PROTEIN = ********
            MACRO_FAT = ********

            closeSettings();
            updateUI();
        }

        function loadSettings() {
            const key = localStorage.getItem('groq_api_key');
            const goal = localStorage.getItem('daily_kcal_goal');
            
            const storedCarbs = localStorage.getItem('macro_pct_carbs');
            const storedProt = localStorage.getItem('macro_pct_protein');
            const storedFat = localStorage.getItem('macro_pct_fat');

            if(key) document.getElementById('apiKeyInput').value = key;
            if(goal) {
                document.getElementById('goalInput').value = goal;
                DEFAULT_GOAL = ********
            }
            
            if(storedCarbs && storedProt && storedFat) {
                MACRO_CARBS = ********
                MACRO_PROTEIN = ********
                MACRO_FAT = ********
            }

            document.getElementById('pctCarbs').value = MACRO_CARBS;
            document.getElementById('pctProtein').value = MACRO_PROTEIN;
            document.getElementById('pctFat').value = MACRO_FAT;
        }

        function clearAllData() {
            if (confirm("⚠️ Möchtest du wirklich die komplette Historie und alle Einstellungen löschen?")) {
                localStorage.clear();
                location.reload();
            }
        }

        async function analyzeMeal() {
            const apiKey = localStorage.getItem('groq_api_key');
            if(!apiKey) {
                alert("🔑 Bitte tippe oben rechts auf das Rädchen ⚙️ und hinterlege deinen GROQ Cloud API Key!");
                openSettings();
                return;
            }

            const mealText = document.getElementById('mealInput').value.trim();
            if(!mealText) {
                alert("📝 Bitte gib ein, was du gegessen hast!");
                return;
            }

            const timeInputVal = document.getElementById('mealTimeInput').value;
            const finalTime = timeInputVal || new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Analyse läuft...';

            const customDictionary = localStorage.getItem('food_dictionary') || '{}';
            const systemPrompt = `Du bist ein präziser Daten-Extraktor für Lebensmittel. Deine Aufgabe ist es, aus dem folgenden Text alle Lebensmittel zu extrahieren und deren Nährwerte basierend auf der genannten menge zu schätzen.

WICHTIGE BENUTZERREGELN (Lern-Modus):
Der Benutzer hat in der Vergangenheit manuelle Korrektionen vorgenommen. In der folgenden JSON-Liste siehst du Lebensmittel mit den Nährwerten für eine ganz bestimmte Basismenge ("amount").
Wenn das eingegebene Lebensmittel mit einem Eintrag aus dieser Liste übereinstimmt, verwende diesen Eintrag als absolut exakte Referenzbasis und berechne (skaliere) die neuen Nährwerte per Dreisatz exakt proportional auf die vom Benutzer aktuell geforderte Menge hoch oder runter!
${customDictionary}

Allgemeine Schätz-Regeln:
1. Wenn im Text keine spezifische Marke genannt wird, nimm hypothetische Standardwerte von deutschen Supermarkt-Eigenmarken (z.B. ja!, Gut & Günstig).
2. Eine Zahl vor dem Lebensmittel definiert die Menge (entweder in Gramm/Milliliter oder als Stück/Scheibe). 
3. Wenn keine Zahl genannt wird, nimm standardmäßig die Menge "1 Stück" oder eine übliche Einzelmenge an.
4. Berechne die Nährwerte (kcal, protein, carbs, fett) proportional für die gesamte angegebene Menge (NICHT pro 100g).

Ausgabe-Format:
Gib ausschließlich das reine JSON-Objekt zurück. Keine Erklärungen, kein Smalltalk, keine Markdown-Formatierung.

{
  "items": [
    {
      "name": "Magerquark",
      "brand": "Eigenmarke",
      "amount": "250g",
      "kcal": 170,
      "protein": 30,
      "carbs": 10,
      "fett": 1
    }
  ]
}`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "openai/gpt-oss-120b", 
                        response_format: { "type": "json_object" }, 
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: mealText }
                        ],
                        temperature: 0.0 
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    alert(`❌ Groq-Fehler (Status ${response.status}):\n\n${errorText}`);
                    return;
                }

                const data = await response.json();
                let aiResponseText = data.choices[0].message.content.trim();
                const parsedData = JSON.parse(aiResponseText);
                const parsedItems = parsedData.items || [];

                if(parsedItems.length === 0) {
                    alert("⚠️ Keine Lebensmittel erkannt. Bitte versuche es mit einer anderen Eingabe!");
                    return;
                }

                const dayData = getDayData();

                parsedItems.forEach(item => {
                    item.time = finalTime;
                    item.isEditing = false;
                    dayData.meals.push(item);
                });

                saveDayData(dayData);
                updateUI();
                document.getElementById('mealInput').value = '';

            } catch (error) {
                console.error("Fehler:", error);
                alert("❌ Fehler beim Verarbeiten: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-bolt"></i> Smart Scan';
            }
        }
    </script>
</body>
</html>
