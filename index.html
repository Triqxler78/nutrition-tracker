<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="Kalorie-Tracker mit Makronährstoffe - Progressive Web App">
    <title>Kalorie Tracker</title>
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Kalorie-Tracker%22,%22short_name%22:%22kcal%22,%22start_url%22:%22/%22,%22display%22:%22standalone%22,%22background_color%22:%22%23f5f7ff%22,%22theme_color%22:%22%23667eea%22}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-light: #8b9eff;
            --danger: #f56565;
            --warning: #ed8936;
            --success: #48bb78;
            --info: #4299e1;
            --light: #f7fafc;
            --lighter: #edf2f7;
            --dark: #2d3748;
            --text: #1a202c;
            --text-light: #718096;
            --border: #e2e8f0;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f5f7ff 0%, #f8f9fa 100%);
            color: var(--text);
            overflow-x: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            padding: 16px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Header & Summary Card */
        .header-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            color: white;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .header-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header-date {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 4px;
        }

        .settings-reset-group {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        .icon-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.3);
        }

        .macros-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .macro-box {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            padding: 12px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .macro-value {
            font-size: 20px;
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
        }

        .macro-label {
            font-size: 12px;
            opacity: 0.85;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .kcal-large {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 2px;
            position: relative;
            z-index: 1;
        }

        .kcal-value {
            font-size: 48px;
            font-weight: 800;
        }

        .kcal-of {
            font-size: 14px;
            opacity: 0.8;
        }

        .kcal-goal {
            font-size: 24px;
            font-weight: 600;
        }

        /* Progress Bar */
        .progress-wrapper {
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .progress-fill {
            height: 100%;
            background: rgba(255,255,255,0.8);
            border-radius: 4px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Meal Input Section */
        .input-section {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .meal-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 8px;
        }

        .meal-tabs::-webkit-scrollbar {
            height: 3px;
        }

        .meal-tabs::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .meal-tab {
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--lighter);
            border: 1px solid var(--border);
            color: var(--text-light);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .meal-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        #foodInput {
            flex: 1;
            background: var(--light);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text);
            font-size: 15px;
            transition: all 0.2s ease;
        }

        #foodInput:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #foodInput::placeholder {
            color: var(--text-light);
        }

        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 10px 10px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 10;
            display: none;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .autocomplete-list.active {
            display: block;
        }

        .autocomplete-item {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s ease;
            font-size: 14px;
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .autocomplete-item:hover {
            background: var(--light);
        }

        .autocomplete-item-main {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 2px;
        }

        .autocomplete-item-sub {
            font-size: 12px;
            color: var(--text-light);
        }

        .btn-voice {
            width: 44px;
            height: 44px;
            padding: 0;
            background: var(--lighter);
            border: 1px solid var(--border);
            color: var(--primary);
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .btn-voice:active {
            background: rgba(102, 126, 234, 0.1);
            border-color: var(--primary);
        }

        .btn-voice.recording {
            background: rgba(245, 101, 101, 0.1);
            border-color: var(--danger);
            color: var(--danger);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .btn {
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* History Section */
        .history-section {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
        }

        .history-empty {
            text-align: center;
            padding: 32px 16px;
            color: var(--text-light);
            font-size: 14px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .history-list::-webkit-scrollbar {
            width: 4px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 12px;
            background: var(--light);
            border-radius: 10px;
            border-left: 4px solid var(--primary);
            animation: slideIn 0.3s ease;
            gap: 10px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .history-item-left {
            flex: 1;
            min-width: 0;
        }

        .history-item-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .meal-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .history-item-food {
            font-weight: 600;
            color: var(--text);
            font-size: 14px;
            word-break: break-word;
        }

        .history-item-meta {
            display: flex;
            gap: 8px;
            font-size: 12px;
            color: var(--text-light);
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .macro-tag {
            display: inline-block;
            padding: 2px 6px;
            background: var(--lighter);
            border-radius: 4px;
            font-size: 11px;
        }

        .macro-tag.protein {
            background: rgba(76, 140, 227, 0.1);
            color: #4c8ce3;
        }

        .macro-tag.carbs {
            background: rgba(237, 137, 54, 0.1);
            color: #ed8936;
        }

        .macro-tag.fat {
            background: rgba(240, 180, 41, 0.1);
            color: #f0b429;
        }

        .history-item-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .history-item-kcal {
            font-weight: 700;
            color: var(--primary);
            font-size: 16px;
        }

        .history-item-delete {
            background: rgba(245, 101, 101, 0.1);
            border: none;
            color: var(--danger);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .history-item-delete:active {
            background: rgba(245, 101, 101, 0.2);
            transform: scale(0.95);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.active {
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            width: 100%;
            max-width: 600px;
            animation: slideUp 0.3s ease;
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.15);
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }

        .modal-header h2 {
            font-size: 20px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 24px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            border-radius: 8px;
        }

        .modal-close:active {
            background: var(--lighter);
            color: var(--text);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 14px;
            background: var(--light);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: var(--text-light);
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }

        .btn-secondary {
            flex: 1;
            background: var(--lighter);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-secondary:active {
            background: var(--border);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 16px;
            right: 16px;
            max-width: 500px;
            margin: 0 auto;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 14px;
            box-shadow: var(--shadow);
            animation: toastSlide 0.3s ease;
            z-index: 2000;
        }

        .toast.success {
            background: rgba(72, 187, 120, 0.1);
            border-color: rgba(72, 187, 120, 0.3);
            color: #22543d;
        }

        .toast.error {
            background: rgba(245, 101, 101, 0.1);
            border-color: rgba(245, 101, 101, 0.3);
            color: var(--danger);
        }

        @keyframes toastSlide {
            from {
                transform: translateX(-50%) translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 12px;
            }

            h1 {
                font-size: 24px;
            }

            .header-card {
                padding: 18px;
            }

            .kcal-value {
                font-size: 40px;
            }

            .macros-grid {
                gap: 10px;
            }

            .macro-box {
                padding: 10px;
            }

            .macro-value {
                font-size: 16px;
            }

            .modal-content {
                border-radius: 20px 20px 0 0;
                padding: 18px;
            }
        }

        /* Confirmation Dialog */
        .confirm-dialog {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1100;
            align-items: center;
            justify-content: center;
        }

        .confirm-dialog.active {
            display: flex;
        }

        .confirm-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 350px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: scaleIn 0.3s ease;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .confirm-content h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }

        .confirm-content p {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .confirm-actions {
            display: flex;
            gap: 10px;
        }

        .confirm-actions button {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .confirm-cancel {
            background: var(--lighter);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .confirm-cancel:active {
            background: var(--border);
        }

        .confirm-confirm {
            background: var(--danger);
            color: white;
        }

        .confirm-confirm:active {
            transform: scale(0.98);
        }

        .input-wrapper {
            position: relative;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header Card -->
        <div class="header-card">
            <div class="header-top">
                <div>
                    <h1>🔥 Kalorie Tracker</h1>
                    <div class="header-date" id="headerDate"></div>
                </div>
                <div class="settings-reset-group">
                    <button class="icon-btn" id="resetBtn" title="Heute zurücksetzen">↻</button>
                </div>
            </div>

            <div class="progress-wrapper">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>

            <div class="kcal-large">
                <span class="kcal-value" id="totalKcal">0</span>
                <span class="kcal-of">/ <span class="kcal-goal" id="kcalGoal">2000</span></span>
            </div>

            <div class="macros-grid">
                <div class="macro-box">
                    <span class="macro-value" id="proteinValue">0g</span>
                    <span class="macro-label">Protein</span>
                </div>
                <div class="macro-box">
                    <span class="macro-value" id="carbsValue">0g</span>
                    <span class="macro-label">Kohlenhydrate</span>
                </div>
                <div class="macro-box">
                    <span class="macro-value" id="fatValue">0g</span>
                    <span class="macro-label">Fett</span>
                </div>
            </div>
        </div>

        <main>
            <!-- Meal Input Section -->
            <div class="input-section">
                <div class="meal-tabs">
                    <button class="meal-tab active" data-meal="Frühst��ck">🌅 Frühstück</button>
                    <button class="meal-tab" data-meal="Mittagessen">🍽️ Mittagessen</button>
                    <button class="meal-tab" data-meal="Snack">🍿 Snack</button>
                    <button class="meal-tab" data-meal="Dinner">🌙 Dinner</button>
                    <button class="meal-tab" data-meal="Sonstiges">📝 Sonstiges</button>
                </div>

                <div class="input-wrapper">
                    <div class="input-group">
                        <input 
                            type="text" 
                            id="foodInput" 
                            placeholder="z.B. 'Döner', 'Apfel', 'Milch'" 
                            autocomplete="off"
                        >
                        <button class="btn-voice" id="voiceBtn" title="Spracheingabe">🎤</button>
                    </div>
                    <div class="autocomplete-list" id="autocompleteList"></div>
                </div>
                <button class="btn btn-primary" id="submitBtn">+ Hinzufügen</button>
            </div>

            <!-- History Section -->
            <div class="history-section">
                <div class="section-header">
                    <span class="section-title">📋 Mahlzeiten heute</span>
                </div>
                <div id="historyContainer" class="history-empty">Noch nichts hinzugefügt</div>
            </div>
        </main>
    </div>

    <!-- Confirmation Dialog -->
    <div class="confirm-dialog" id="confirmDialog">
        <div class="confirm-content">
            <h3 id="confirmTitle">Bestätigung</h3>
            <p id="confirmMessage">Sind Sie sicher?</p>
            <div class="confirm-actions">
                <button class="confirm-cancel" id="confirmCancel">Nein</button>
                <button class="confirm-confirm" id="confirmConfirm">Ja, zurücksetzen</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== APP STATE ====================
        let currentMeal = 'Frühstück';
        let dailyData = [];
        let kcalGoal = 2000;

        // ==================== NUTRITION API ====================
        const NutritionAPI = {
            // Using Edamam API or similar service
            searchFood: async (query) => {
                try {
                    // Using OpenFoodFacts API (free, no auth required)
                    const response = await fetch(
                        `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&json=1&page_size=10`
                    );
                    const data = await response.json();
                    
                    return data.products?.map(product => ({
                        name: product.product_name || 'Unbekanntes Produkt',
                        kcal: product.nutriments?.['energy-kcal'] || product.nutriments?.['energy-kcal_100g'] || 0,
                        protein: product.nutriments?.proteins_100g || 0,
                        carbs: product.nutriments?.carbohydrates_100g || 0,
                        fat: product.nutriments?.fat_100g || 0,
                        serving: product.serving_size || '100g'
                    })).filter(item => item.kcal > 0) || [];
                } catch (error) {
                    console.log('API Error:', error);
                    return [];
                }
            }
        };

        // ==================== UI ELEMENTS ====================
        const elements = {
            headerDate: document.getElementById('headerDate'),
            totalKcal: document.getElementById('totalKcal'),
            kcalGoal: document.getElementById('kcalGoal'),
            proteinValue: document.getElementById('proteinValue'),
            carbsValue: document.getElementById('carbsValue'),
            fatValue: document.getElementById('fatValue'),
            progressFill: document.getElementById('progressFill'),
            foodInput: document.getElementById('foodInput'),
            voiceBtn: document.getElementById('voiceBtn'),
            submitBtn: document.getElementById('submitBtn'),
            mealTabs: document.querySelectorAll('.meal-tab'),
            historyContainer: document.getElementById('historyContainer'),
            autocompleteList: document.getElementById('autocompleteList'),
            resetBtn: document.getElementById('resetBtn'),
            confirmDialog: document.getElementById('confirmDialog'),
            confirmCancel: document.getElementById('confirmCancel'),
            confirmConfirm: document.getElementById('confirmConfirm')
        };

        // ==================== EVENT LISTENERS ====================
        elements.mealTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                elements.mealTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentMeal = tab.getAttribute('data-meal');
            });
        });

        elements.foodInput.addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            if (query.length < 2) {
                elements.autocompleteList.classList.remove('active');
                return;
            }

            const results = await NutritionAPI.searchFood(query);
            displayAutocomplete(results);
        });

        elements.submitBtn.addEventListener('click', addFoodEntry);
        elements.resetBtn.addEventListener('click', resetDay);
        elements.confirmCancel.addEventListener('click', closeConfirmDialog);
        elements.confirmConfirm.addEventListener('click', confirmReset);

        // ==================== FUNCTIONS ====================
        function displayAutocomplete(results) {
            elements.autocompleteList.innerHTML = '';
            
            if (results.length === 0) {
                elements.autocompleteList.classList.remove('active');
                return;
            }

            results.forEach(item => {
                const div = document.createElement('div');
                div.className = 'autocomplete-item';
                div.innerHTML = `
                    <div class="autocomplete-item-main">${item.name}</div>
                    <div class="autocomplete-item-sub">${Math.round(item.kcal)} kcal | P: ${item.protein.toFixed(1)}g | K: ${item.carbs.toFixed(1)}g | F: ${item.fat.toFixed(1)}g</div>
                `;
                div.addEventListener('click', () => selectFood(item));
                elements.autocompleteList.appendChild(div);
            });

            elements.autocompleteList.classList.add('active');
        }

        function selectFood(item) {
            elements.foodInput.value = item.name;
            elements.autocompleteList.classList.remove('active');
            addFoodEntry(item);
        }

        function addFoodEntry(item) {
            if (!item) {
                const query = elements.foodInput.value.trim();
                if (!query) return;
                showToast('Bitte wähle ein Lebensmittel aus der Liste', 'error');
                return;
            }

            const entry = {
                name: item.name,
                meal: currentMeal,
                kcal: item.kcal,
                protein: item.protein,
                carbs: item.carbs,
                fat: item.fat,
                timestamp: new Date().getTime()
            };

            dailyData.push(entry);
            elements.foodInput.value = '';
            elements.autocompleteList.classList.remove('active');
            updateUI();
            showToast(`${item.name} hinzugefügt!`, 'success');
        }

        function updateUI() {
            const totals = dailyData.reduce((acc, item) => ({
                kcal: acc.kcal + item.kcal,
                protein: acc.protein + item.protein,
                carbs: acc.carbs + item.carbs,
                fat: acc.fat + item.fat
            }), { kcal: 0, protein: 0, carbs: 0, fat: 0 });

            elements.totalKcal.textContent = Math.round(totals.kcal);
            elements.proteinValue.textContent = totals.protein.toFixed(1) + 'g';
            elements.carbsValue.textContent = totals.carbs.toFixed(1) + 'g';
            elements.fatValue.textContent = totals.fat.toFixed(1) + 'g';
            
            const progress = (totals.kcal / kcalGoal) * 100;
            elements.progressFill.style.width = Math.min(progress, 100) + '%';

            renderHistory();
            saveToLocalStorage();
        }

        function renderHistory() {
            if (dailyData.length === 0) {
                elements.historyContainer.innerHTML = '<div class="history-empty">Noch nichts hinzugefügt</div>';
                return;
            }

            const html = dailyData.map((item, idx) => `
                <div class="history-item">
                    <div class="history-item-left">
                        <div class="history-item-header">
                            <span class="meal-badge">${item.meal}</span>
                        </div>
                        <div class="history-item-food">${item.name}</div>
                        <div class="history-item-meta">
                            <span class="macro-tag protein">P: ${item.protein.toFixed(1)}g</span>
                            <span class="macro-tag carbs">K: ${item.carbs.toFixed(1)}g</span>
                            <span class="macro-tag fat">F: ${item.fat.toFixed(1)}g</span>
                        </div>
                    </div>
                    <div class="history-item-right">
                        <div class="history-item-kcal">${Math.round(item.kcal)}</div>
                        <button class="history-item-delete" onclick="deleteEntry(${idx})">🗑️</button>
                    </div>
                </div>
            `).join('');

            elements.historyContainer.innerHTML = `<div class="history-list">${html}</div>`;
        }

        function deleteEntry(idx) {
            dailyData.splice(idx, 1);
            updateUI();
        }

        function resetDay() {
            elements.confirmDialog.classList.add('active');
        }

        function confirmReset() {
            dailyData = [];
            updateUI();
            closeConfirmDialog();
            showToast('Tag zurückgesetzt!', 'success');
        }

        function closeConfirmDialog() {
            elements.confirmDialog.classList.remove('active');
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function updateDate() {
            const today = new Date();
            const formatted = today.toLocaleDateString('de-DE', { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' });
            elements.headerDate.textContent = formatted;
        }

        function saveToLocalStorage() {
            localStorage.setItem('dailyData_' + new Date().toDateString(), JSON.stringify(dailyData));
        }

        function loadFromLocalStorage() {
            const key = 'dailyData_' + new Date().toDateString();
            const saved = localStorage.getItem(key);
            if (saved) {
                dailyData = JSON.parse(saved);
                updateUI();
            }
        }

        // ==================== INIT ====================
        updateDate();
        loadFromLocalStorage();
    </script>
</body>
</html>
