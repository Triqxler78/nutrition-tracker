<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>NutriTrack Premium — iOS Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* --- Premium iOS Design System (Light Mode Defaults) --- */
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-text-main: #000000;
            --ios-text-muted: #8E8E93;
            --ios-text-light: #AEAEB2;
            
            --primary: #34C759;      /* iOS Green */
            --primary-light: #E8F9EC;
            --accent-blue: #007AFF;  /* iOS Blue */
            --accent-orange: #FF9500;/* iOS Orange */
            --accent-red: #FF3B30;   /* iOS Red */
            --accent-teal: #5AC8FA;  /* iOS Teal */
            
            --protein-color: var(--accent-blue);
            --carbs-color: var(--accent-orange);
            --fat-color: var(--accent-red);
            
            --border-color: #E5E5EA;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        /* --- AUTOMATISCHER DARKMODE FÜR OLED --- */
        @media (prefers-color-scheme: dark) {
            :root {
                --ios-bg: #000000;         /* Tiefschwarz für OLED */
                --ios-card: #1C1C1E;       /* Dunkelgrau für Karten */
                --ios-text-main: #FFFFFF;
                --ios-text-muted: #8E8E93;
                --border-color: #38383A;
                --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
                --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.3);
                --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.4);
            }
            .meal-slot-content {
                background: #121212 !important; /* Dunklerer HG für aufgeklappte Listen */
            }
            .date-switcher {
                background: rgba(118, 118, 128, 0.24) !important;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--ios-bg);
            color: var(--ios-text-main);
            /* Automatischer iPhone-Rand */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            overflow-x: hidden; /* Verhindert Wischen zur Seite / Out of screen Bug */
            width: 100vw;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto; /* Zentriert auf größeren Bildschirmen */
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px 16px 40px 16px; /* FIX: Fester Abstand zum Displayrand hinzugefügt */
        }

        /* --- CALENDAR NAVIGATION HEADER --- */
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 4px 0 4px;
        }

        .header-nav h1 {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .date-switcher {
            display: flex;
            align-items: center;
            background: rgba(118, 118, 128, 0.12);
            padding: 4px;
            border-radius: 99px;
            gap: 4px;
        }

        .date-btn {
            background: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-blue);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .date-btn:active {
            background: rgba(128, 128, 128, 0.3);
        }

        .date-display {
            font-size: 14px;
            font-weight: 600;
            padding: 0 12px;
            min-width: 90px;
            text-align: center;
        }

        .top-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: var(--ios-card);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-blue);
            font-size: 18px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .icon-btn:active {
            transform: scale(0.92);
        }

        /* --- MAIN DASHBOARD CARD --- */
        .dashboard-card {
            background: var(--ios-card);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .main-stats-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            width: 100%;
            align-items: center;
            margin-bottom: 24px;
        }

        .stat-column { text-align: center; }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--ios-text-main);
        }

        .stat-label {
            font-size: 12px;
            color: var(--ios-text-muted);
            margin-top: 2px;
            font-weight: 500;
        }

        /* Circular Progress Ring */
        .progress-ring-container {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .progress-ring-circle {
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            transition: stroke-dashoffset 0.5s ease-in-out;
        }

        .progress-text-center {
            position: absolute;
            text-align: center;
        }

        .progress-text-center .number {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
            display: block;
            line-height: 1;
        }

        .progress-text-center .label {
            font-size: 12px;
            color: var(--ios-text-muted);
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* Inline Horizontal Macros */
        .macro-bars-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .macro-bar-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .macro-bar-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 600;
        }

        .macro-name { color: var(--ios-text-muted); }
        .macro-numbers { color: var(--ios-text-main); }

        .macro-progress-bg {
            height: 8px;
            background: var(--ios-bg);
            border-radius: 99px;
            overflow: hidden;
            width: 100%;
        }

        .macro-progress-fill {
            height: 100%;
            border-radius: 99px;
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- TRACKER CARD --- */
        .tracker-card {
            background: var(--ios-card);
            border-radius: 24px;
            padding: 20px;
            box-shadow: var(--shadow-md);
        }

        .section-title-ios {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-pill-box {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 12px;
            scrollbar-width: none;
        }
        .category-pill-box::-webkit-scrollbar { display: none; }

        .category-pill {
            background: var(--ios-bg);
            border: none;
            padding: 8px 16px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 600;
            color: var(--ios-text-muted);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .category-pill.active {
            background: var(--accent-blue);
            color: #FFFFFF;
        }

        textarea {
            width: 100%;
            border: 1px solid var(--border-color);
            background: var(--ios-bg);
            color: var(--ios-text-main);
            border-radius: 16px;
            padding: 14px;
            font-size: 15px;
            outline: none;
            resize: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--accent-blue);
        }

        .action-row {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        .btn-ios {
            flex: 1;
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2);
            transition: all 0.2s;
        }

        .btn-ios:active { transform: scale(0.97); opacity: 0.9; }
        .btn-ios:disabled { background: var(--ios-text-light); box-shadow: none; cursor: not-allowed; }

        /* --- MEAL ACCORDION SLOTS --- */
        .slots-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .meal-slot-card {
            background: var(--ios-card);
            border-radius: 20px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: all 0.25s;
        }

        .meal-slot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            cursor: pointer;
            user-select: none;
        }

        .meal-slot-header-left { display: flex; align-items: center; gap: 14px; }

        .meal-slot-icon-wrapper {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .slot-frühstück { background-color: rgba(90, 200, 250, 0.12); color: var(--accent-teal); }
        .slot-mittagessen { background-color: rgba(255, 149, 0, 0.12); color: var(--accent-orange); }
        .slot-abendessen { background-color: rgba(52, 199, 89, 0.12); color: var(--primary); }
        .slot-snacks { background-color: rgba(255, 59, 48, 0.12); color: var(--accent-red); }

        .meal-slot-title { font-size: 17px; font-weight: 600; }
        .meal-slot-subtitle { font-size: 12px; color: var(--ios-text-muted); margin-top: 1px; }
        .meal-slot-header-right { display: flex; align-items: center; gap: 12px; }

        .meal-slot-kcal-badge {
            font-size: 15px;
            font-weight: 700;
            color: var(--ios-text-main);
        }

        .plus-circle-btn {
            color: var(--accent-blue);
            font-size: 22px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .plus-circle-btn:active { transform: scale(0.9); }

        .meal-slot-content {
            border-top: 1px solid var(--border-color);
            background: #FAFAFC;
            display: none;
            flex-direction: column;
            padding: 8px 16px;
        }

        .meal-slot-card.expanded .meal-slot-content { display: flex; }

        .food-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .food-item-row:last-child { border-bottom: none; }

        .food-details { flex: 1; }
        .food-title { font-size: 15px; font-weight: 600; }
        .food-subinfo { font-size: 12px; color: var(--ios-text-muted); margin-top: 2px; display: flex; gap: 8px; }

        .food-row-right { display: flex; align-items: center; gap: 14px; }
        .food-kcal { font-size: 15px; font-weight: 600; }
        .food-actions { display: flex; gap: 8px; font-size: 16px; }

        .food-action-icon {
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .food-action-icon.edit { color: var(--accent-blue); }
        .food-action-icon.delete { color: var(--accent-red); }

        /* --- SETTINGS AREA --- */
        .settings-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 999;
            display: none;
            justify-content: center;
            align-items: flex-end;
        }
        .settings-overlay.show { display: flex; }

        .settings-sheet {
            background: var(--ios-card);
            width: 100%;
            max-width: 480px;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .input-group-ios { margin-bottom: 16px; }
        .input-group-ios label {
            font-size: 13px;
            color: var(--ios-text-muted);
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .input-group-ios input {
            width: 100%;
            padding: 12px 14px;
            background: var(--ios-bg);
            color: var(--ios-text-main);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
        }
        .input-group-ios input:focus { border-color: var(--accent-blue); }

        /* --- EDITING INLINE FORM (MIT BESTÄTIGEN-BUTTON) --- */
        .inline-edit-box {
            background: var(--ios-bg);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid var(--accent-blue);
            margin: 8px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .inline-edit-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .inline-edit-box label {
            font-size: 10px;
            color: var(--ios-text-muted);
            text-align: center;
            display: block;
            margin-bottom: 2px;
        }

        .inline-edit-box input {
            width: 100%;
            padding: 8px;
            background: var(--ios-card);
            color: var(--ios-text-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }
        
        .inline-edit-box input.title-input {
            grid-column: span 4;
            text-align: left;
        }

        .empty-slot-text {
            font-size: 13px;
            color: var(--ios-text-muted);
            text-align: center;
            padding: 12px 0;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="header-nav">
            <h1>Heute</h1>
            <div class="top-actions">
                <div class="date-switcher">
                    <button class="date-btn" onclick="changeDate(-1)"><i class="fas fa-chevron-left"></i></button>
                    <span class="date-display" id="dateLabel">15. Juni</span>
                    <button class="date-btn" onclick="changeDate(1)"><i class="fas fa-chevron-right"></i></button>
                </div>
                <button class="icon-btn" onclick="openSettings()"><i class="fas fa-cog"></i></button>
            </div>
        </div>

        <div class="dashboard-card">
            <div class="main-stats-grid">
                <div class="stat-column">
                    <div class="stat-value" id="totalGegessen">0</div>
                    <div class="stat-label">Gegessen</div>
                </div>
                
                <div class="progress-ring-container">
                    <svg width="150" height="150">
                        <circle stroke="var(--border-color)" stroke-width="10" fill="transparent" r="64" cx="75" cy="75"/>
                        <circle class="progress-ring-circle" id="progressCircle" stroke="var(--primary)" stroke-width="10" stroke-linecap="round" fill="transparent" r="64" cx="75" cy="75" stroke-dasharray="402.12" stroke-dashoffset="402.12"/>
                    </svg>
                    <div class="progress-text-center">
                        <span class="number" id="totalUebrig">2000</span>
                        <span class="label">Übrig</span>
                    </div>
                </div>

                <div class="stat-column" style="position: relative;">
                    <div class="stat-value" id="totalVerbrannt" style="cursor:pointer; color: var(--accent-teal);" onclick="promptBurnedCalories()">0</div>
                    <div class="stat-label">Verbrannt <i class="fas fa-plus-circle" style="font-size:10px;"></i></div>
                </div>
            </div>

            <div class="macro-bars-container">
                <div class="macro-bar-row">
                    <div class="macro-bar-header">
                        <span class="macro-name">Kohlenhydrate</span>
                        <span class="macro-numbers"><span id="macroCarbsCurrent">0</span> / <span id="macroCarbsTarget">250</span> g</span>
                    </div>
                    <div class="macro-progress-bg">
                        <div class="macro-progress-fill" id="barCarbs" style="background-color: var(--carbs-color);"></div>
                    </div>
                </div>
                <div class="macro-bar-row">
                    <div class="macro-bar-header">
                        <span class="macro-name">Eiweiß</span>
                        <span class="macro-numbers"><span id="macroProteinCurrent">0</span> / <span id="macroProteinTarget">120</span> g</span>
                    </div>
                    <div class="macro-progress-bg">
                        <div class="macro-progress-fill" id="barProtein" style="background-color: var(--protein-color);"></div>
                    </div>
                </div>
                <div class="macro-bar-row">
                    <div class="macro-bar-header">
                        <span class="macro-name">Fett</span>
                        <span class="macro-numbers"><span id="macroFatCurrent">0</span> / <span id="macroFatTarget">65</span> g</span>
                    </div>
                    <div class="macro-progress-bg">
                        <div class="macro-progress-fill" id="barFat" style="background-color: var(--fat-color);"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tracker-card">
            <div class="section-title-ios"><i class="fas fa-sparkles" style="color: var(--accent-orange);"></i> Mahlzeit tracken</div>
            
            <div class="category-pill-box">
                <button class="category-pill active" onclick="selectCategory('Frühstück', this)">🥣 Frühstück</button>
                <button class="category-pill" onclick="selectCategory('Mittagessen', this)">🥪 Mittagessen</button>
                <button class="category-pill" onclick="selectCategory('Abendessen', this)">🥗 Abendessen</button>
                <button class="category-pill" onclick="selectCategory('Snacks', this)">🍎 Snacks</button>
            </div>

            <textarea id="mealInput" rows="3" placeholder="Z.B. 1 Banane, 50g Haferflocken und 200ml Milch..."></textarea>
            
            <div class="action-row">
                <button id="submitBtn" class="btn-ios" onclick="analyzeMeal()">
                    <i class="fas fa-bolt"></i> Smart Scan
                </button>
            </div>
        </div>

        <div class="slots-container">
            
            <div class="meal-slot-card" id="slotCard-Frühstück">
                <div class="meal-slot-header" onclick="toggleSlotExpansion('Frühstück')">
                    <div class="meal-slot-header-left">
                        <div class="meal-slot-icon-wrapper slot-frühstück"><i class="fas fa-coffee"></i></div>
                        <div>
                            <div class="meal-slot-title">Frühstück</div>
                            <div class="meal-slot-subtitle" id="slotSub-Frühstück">Keine Einträge</div>
                        </div>
                    </div>
                    <div class="meal-slot-header-right">
                        <div class="meal-slot-kcal-badge"><span id="slotKcal-Frühstück">0</span> kcal</div>
                        <i class="fas fa-plus-circle plus-circle-btn" onclick="event.stopPropagation(); quickAddRoute('Frühstück')"></i>
                    </div>
                </div>
                <div class="meal-slot-content" id="slotContent-Frühstück"></div>
            </div>

            <div class="meal-slot-card" id="slotCard-Mittagessen">
                <div class="meal-slot-header" onclick="toggleSlotExpansion('Mittagessen')">
                    <div class="meal-slot-header-left">
                        <div class="meal-slot-icon-wrapper slot-mittagessen"><i class="fas fa-hamburger"></i></div>
                        <div>
                            <div class="meal-slot-title">Mittagessen</div>
                            <div class="meal-slot-subtitle" id="slotSub-Mittagessen">Keine Einträge</div>
                        </div>
                    </div>
                    <div class="meal-slot-header-right">
                        <div class="meal-slot-kcal-badge"><span id="slotKcal-Mittagessen">0</span> kcal</div>
                        <i class="fas fa-plus-circle plus-circle-btn" onclick="event.stopPropagation(); quickAddRoute('Mittagessen')"></i>
                    </div>
                </div>
                <div class="meal-slot-content" id="slotContent-Mittagessen"></div>
            </div>

            <div class="meal-slot-card" id="slotCard-Abendessen">
                <div class="meal-slot-header" onclick="toggleSlotExpansion('Abendessen')">
                    <div class="meal-slot-header-left">
                        <div class="meal-slot-icon-wrapper slot-abendessen"><i class="fas fa-utensils"></i></div>
                        <div>
                            <div class="meal-slot-title">Abendessen</div>
                            <div class="meal-slot-subtitle" id="slotSub-Abendessen">Keine Einträge</div>
                        </div>
                    </div>
                    <div class="meal-slot-header-right">
                        <div class="meal-slot-kcal-badge"><span id="slotKcal-Abendessen">0</span> kcal</div>
                        <i class="fas fa-plus-circle plus-circle-btn" onclick="event.stopPropagation(); quickAddRoute('Abendessen')"></i>
                    </div>
                </div>
                <div class="meal-slot-content" id="slotContent-Abendessen"></div>
            </div>

            <div class="meal-slot-card" id="slotCard-Snacks">
                <div class="meal-slot-header" onclick="toggleSlotExpansion('Snacks')">
                    <div class="meal-slot-header-left">
                        <div class="meal-slot-icon-wrapper slot-snacks"><i class="fas fa-apple-alt"></i></div>
                        <div>
                            <div class="meal-slot-title">Snacks</div>
                            <div class="meal-slot-subtitle" id="slotSub-Snacks">Keine Einträge</div>
                        </div>
                    </div>
                    <div class="meal-slot-header-right">
                        <div class="meal-slot-kcal-badge"><span id="slotKcal-Snacks">0</span> kcal</div>
                        <i class="fas fa-plus-circle plus-circle-btn" onclick="event.stopPropagation(); quickAddRoute('Snacks')"></i>
                    </div>
                </div>
                <div class="meal-slot-content" id="slotContent-Snacks"></div>
            </div>

        </div>

    </div>

    <div class="settings-overlay" id="settingsOverlay" onclick="closeSettings()">
        <div class="settings-sheet" onclick="event.stopPropagation()">
            <div class="settings-header">
                <h2 style="font-size: 20px; font-weight: 700;">Einstellungen</h2>
                <button class="icon-btn" style="width:32px; height:32px; font-size:14px;" onclick="closeSettings()"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="input-group-ios">
                <label>🔑 Groq Cloud API Key</label>
                <input type="password" id="apiKeyInput" placeholder="gsk_...">
            </div>
            <div class="input-group-ios">
                <label>🎯 Tagesziel (kcal)</label>
                <input type="number" id="goalInput" placeholder="z.B. 2000" min="500" max="5000">
            </div>

            <button class="btn-ios" style="margin-top: 10px; width: 100%;" onclick="saveSettings()">
                <i class="fas fa-check-circle"></i> Speichern & Schließen
            </button>
            
            <button class="btn-ios" style="margin-top: 12px; width: 100%; background: var(--accent-red); box-shadow:none;" onclick="clearAllData()">
                <i class="fas fa-trash-alt"></i> Alle lokalen Daten löschen
            </button>
        </div>
    </div>

    <script>
        // --- Globale Variablen ---
        let activeCategory = 'Frühstück';
        let DEFAULT_GOAL = 2000;
        let viewedDate = new Date();
        let editingMealId = null;

        // --- Init ---
        window.onload = function() {
            migrateOldSchema();
            loadSettings();
            updateUI();
        };

        // --- Datums-Logik ---
        function getFormattedDateKey(dateObj) {
            return dateObj.toISOString().split('T')[0];
        }

        function getHumanReadableDateLabel(dateObj) {
            const today = new Date();
            const yesterday = new Date();
            yesterday.setDate(today.getDate() - 1);
            
            if (getFormattedDateKey(dateObj) === getFormattedDateKey(today)) return 'Heute';
            if (getFormattedDateKey(dateObj) === getFormattedDateKey(yesterday)) return 'Gestern';
            
            return dateObj.toLocaleDateString('de-DE', { day: 'numeric', month: 'short' });
        }

        function changeDate(daysOffset) {
            viewedDate.setDate(viewedDate.getDate() + daysOffset);
            document.querySelector('.header-nav h1').innerText = getHumanReadableDateLabel(viewedDate);
            document.getElementById('dateLabel').innerText = viewedDate.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
            updateUI();
        }

        // --- Datenbank & Migration ---
        function migrateOldSchema() {
            const oldLog = localStorage.getItem('meal_log');
            if (oldLog) {
                try {
                    const parsed = JSON.parse(oldLog);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        const todayKey = getFormattedDateKey(new Date());
                        let database = JSON.parse(localStorage.getItem('meal_log_v2')) || {};
                        if (!database[todayKey]) database[todayKey] = { meals: [], burned: 0 };
                        
                        parsed.forEach(item => {
                            if (!item.category) item.category = 'Snacks';
                            database[todayKey].meals.push(item);
                        });
                        localStorage.setItem('meal_log_v2', JSON.stringify(database));
                    }
                    localStorage.removeItem('meal_log');
                } catch(e) { console.error("Migration error:", e); }
            }
        }

        function getDayData() {
            const dateKey = getFormattedDateKey(viewedDate);
            let database = JSON.parse(localStorage.getItem('meal_log_v2')) || {};
            if (!database[dateKey]) {
                database[dateKey] = { meals: [], burned: 0 };
            }
            return database[dateKey];
        }

        function saveDayData(dayDataObj) {
            const dateKey = getFormattedDateKey(viewedDate);
            let database = JSON.parse(localStorage.getItem('meal_log_v2')) || {};
            database[dateKey] = dayDataObj;
            localStorage.setItem('meal_log_v2', JSON.stringify(database));
            updateUI();
        }

        // --- UI Steuerung ---
        function selectCategory(categoryName, element) {
            activeCategory = categoryName;
            document.querySelectorAll('.category-pill').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        function quickAddRoute(categoryName) {
            activeCategory = categoryName;
            document.querySelectorAll('.category-pill').forEach(btn => {
                if(btn.innerText.includes(categoryName)) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            document.getElementById('mealInput').focus();
            
            // Wenn der Slot noch nicht offen ist, öffne ihn
            const card = document.getElementById(`slotCard-${categoryName}`);
            if(!card.classList.contains('expanded')) {
                toggleSlotExpansion(categoryName);
            }
        }

        function toggleSlotExpansion(category) {
            const card = document.getElementById(`slotCard-${category}`);
            card.classList.toggle('expanded');
        }

        function openSettings() { document.getElementById('settingsOverlay').classList.add('show'); }
        function closeSettings() { document.getElementById('settingsOverlay').classList.remove('show'); }
        
        function loadSettings() {
            const savedGoal = localStorage.getItem('daily_goal');
            const savedKey = localStorage.getItem('groq_api_key');
            if(savedGoal) {
                DEFAULT_GOAL = parseInt(savedGoal);
                document.getElementById('goalInput').value = DEFAULT_GOAL;
            }
            if(savedKey) {
                document.getElementById('apiKeyInput').value = savedKey;
            }
        }

        function saveSettings() {
            const goal = document.getElementById('goalInput').value;
            const key = document.getElementById('apiKeyInput').value;
            if(goal) {
                localStorage.setItem('daily_goal', goal);
                DEFAULT_GOAL = parseInt(goal);
            }
            if(key) {
                localStorage.setItem('groq_api_key', key);
            }
            closeSettings();
            updateUI();
        }

        function promptBurnedCalories() {
            const currentBurned = getDayData().burned || 0;
            const input = prompt("Wie viele Kalorien hast du heute durch Sport verbrannt?", currentBurned);
            if(input !== null && !isNaN(input)) {
                let data = getDayData();
                data.burned = parseInt(input) || 0;
                saveDayData(data);
            }
        }

        function clearAllData() {
            if(confirm("Bist du sicher? Alle Tage und Einstellungen werden gelöscht.")) {
                localStorage.clear();
                location.reload();
            }
        }

        // --- UI Updates ---
        function updateUI() {
            const data = getDayData();
            const meals = data.meals || [];
            const burned = data.burned || 0;

            let totalKcal = 0, totalProtein = 0, totalCarbs = 0, totalFat = 0;
            const categories = ['Frühstück', 'Mittagessen', 'Abendessen', 'Snacks'];
            const categorySums = { 'Frühstück': 0, 'Mittagessen': 0, 'Abendessen': 0, 'Snacks': 0 };

            // Berechnen
            meals.forEach(m => {
                totalKcal += m.kcal || 0;
                totalProtein += m.protein || 0;
                totalCarbs += m.carbs || 0;
                totalFat += m.fat || 0;
                if(categorySums[m.category] !== undefined) {
                    categorySums[m.category] += (m.kcal || 0);
                }
            });

            // Oben Dashboard
            document.getElementById('totalGegessen').innerText = totalKcal;
            document.getElementById('totalVerbrannt').innerText = burned;
            
            let remaining = DEFAULT_GOAL - totalKcal + burned;
            document.getElementById('totalUebrig').innerText = remaining;

            // Ring Animation
            const circle = document.getElementById('progressCircle');
            const radius = circle.r.baseVal.value;
            const circumference = radius * 2 * Math.PI;
            const percent = Math.min((totalKcal / (DEFAULT_GOAL + burned)) * 100, 100);
            const offset = circumference - (percent / 100) * circumference;
            circle.style.strokeDasharray = `${circumference} ${circumference}`;
            circle.style.strokeDashoffset = isNaN(offset) ? circumference : offset;
            
            // Makros (Standard-Ziele basierend auf Goal: 50% Carbs, 25% Prot, 25% Fat grob)
            const goalCarbs = Math.round((DEFAULT_GOAL * 0.5) / 4);
            const goalProtein = Math.round((DEFAULT_GOAL * 0.25) / 4);
            const goalFat = Math.round((DEFAULT_GOAL * 0.25) / 9);

            document.getElementById('macroCarbsCurrent').innerText = totalCarbs;
            document.getElementById('macroCarbsTarget').innerText = goalCarbs;
            document.getElementById('barCarbs').style.width = `${Math.min((totalCarbs/goalCarbs)*100, 100)}%`;

            document.getElementById('macroProteinCurrent').innerText = totalProtein;
            document.getElementById('macroProteinTarget').innerText = goalProtein;
            document.getElementById('barProtein').style.width = `${Math.min((totalProtein/goalProtein)*100, 100)}%`;

            document.getElementById('macroFatCurrent').innerText = totalFat;
            document.getElementById('macroFatTarget').innerText = goalFat;
            document.getElementById('barFat').style.width = `${Math.min((totalFat/goalFat)*100, 100)}%`;

            // Listen füllen
            categories.forEach(cat => {
                document.getElementById(`slotKcal-${cat}`).innerText = categorySums[cat];
                const catMeals = meals.filter(m => m.category === cat);
                document.getElementById(`slotSub-${cat}`).innerText = catMeals.length > 0 ? `${catMeals.length} Einträge` : 'Keine Einträge';
                
                const contentDiv = document.getElementById(`slotContent-${cat}`);
                if(catMeals.length === 0) {
                    contentDiv.innerHTML = `<div class="empty-slot-text">Noch nichts eingetragen</div>`;
                } else {
                    contentDiv.innerHTML = catMeals.map(m => {
                        // Wenn dieses Item gerade bearbeitet wird:
                        if(editingMealId === m.id) {
                            return `
                                <div class="inline-edit-box">
                                    <input type="text" class="title-input" id="editTitle_${m.id}" value="${m.title}">
                                    <div class="inline-edit-grid">
                                        <div>
                                            <label>Kcal</label>
                                            <input type="number" id="editKcal_${m.id}" value="${m.kcal}">
                                        </div>
                                        <div>
                                            <label>Kohlenh. (g)</label>
                                            <input type="number" id="editCarbs_${m.id}" value="${m.carbs}">
                                        </div>
                                        <div>
                                            <label>Eiweiß (g)</label>
                                            <input type="number" id="editProtein_${m.id}" value="${m.protein}">
                                        </div>
                                        <div>
                                            <label>Fett (g)</label>
                                            <input type="number" id="editFat_${m.id}" value="${m.fat}">
                                        </div>
                                    </div>
                                    <button class="btn-ios" style="padding: 10px; font-size: 14px; border-radius: 10px;" onclick="saveMealEdit('${m.id}')">
                                        <i class="fas fa-check"></i> Bestätigen
                                    </button>
                                </div>
                            `;
                        } else {
                            return `
                                <div class="food-item-row">
                                    <div class="food-details">
                                        <div class="food-title">${m.title}</div>
                                        <div class="food-subinfo">
                                            <span>${m.carbs}g K</span> • 
                                            <span>${m.protein}g E</span> • 
                                            <span>${m.fat}g F</span>
                                        </div>
                                    </div>
                                    <div class="food-row-right">
                                        <div class="food-kcal">${m.kcal} kcal</div>
                                        <div class="food-actions">
                                            <div class="food-action-icon edit" onclick="startEditMeal('${m.id}')"><i class="fas fa-pen"></i></div>
                                            <div class="food-action-icon delete" onclick="deleteMeal('${m.id}')"><i class="fas fa-trash"></i></div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        }
                    }).join('');
                }
            });
            
            // Setze Datum Header einmalig
            document.querySelector('.header-nav h1').innerText = getHumanReadableDateLabel(viewedDate);
        }

        // --- Bearbeiten / Löschen ---
        function startEditMeal(id) {
            editingMealId = id;
            updateUI(); // Rerendert die Liste mit dem Eingabefeld
        }

        function saveMealEdit(id) {
            const data = getDayData();
            const mealIndex = data.meals.findIndex(m => m.id === id);
            
            if(mealIndex > -1) {
                data.meals[mealIndex].title = document.getElementById(`editTitle_${id}`).value;
                data.meals[mealIndex].kcal = parseInt(document.getElementById(`editKcal_${id}`).value) || 0;
                data.meals[mealIndex].carbs = parseInt(document.getElementById(`editCarbs_${id}`).value) || 0;
                data.meals[mealIndex].protein = parseInt(document.getElementById(`editProtein_${id}`).value) || 0;
                data.meals[mealIndex].fat = parseInt(document.getElementById(`editFat_${id}`).value) || 0;
                
                saveDayData(data);
            }
            editingMealId = null; // Beendet Bearbeitungsmodus
            updateUI();
        }

        function deleteMeal(id) {
            if(confirm('Eintrag löschen?')) {
                const data = getDayData();
                data.meals = data.meals.filter(m => m.id !== id);
                saveDayData(data);
            }
        }

        // --- Groq AI API ---
        async function analyzeMeal() {
            const apiKey = localStorage.getItem('groq_api_key');
            const inputField = document.getElementById('mealInput');
            const foodText = inputField.value.trim();

            if (!apiKey) return alert('Bitte zuerst den Groq API Key in den Einstellungen hinterlegen!');
            if (!foodText) return alert('Bitte gib ein, was du gegessen hast.');

            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Analysiere...';
            btn.disabled = true;

            const prompt = `Analysiere folgende Mahlzeit und antworte AUSSCHLIESSLICH im JSON Format ohne Markdown. Schätze die Nährwerte realistisch. Format: {"title": "Name der Mahlzeit", "kcal": Zahl, "protein": Zahl, "carbs": Zahl, "fat": Zahl}. Mahlzeit: ${foodText}`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.1
                    })
                });

                const jsonStr = await response.json();
                let resultText = jsonStr.choices[0].message.content.trim();
                
                // Parse bereinigen falls AI Markdown Code-Blöcke sendet
                if(resultText.startsWith('```json')) resultText = resultText.replace('```json', '').replace('```', '');
                
                const resultObj = JSON.parse(resultText);
                
                const newMeal = {
                    id: Date.now().toString(),
                    category: activeCategory,
                    title: resultObj.title || foodText.substring(0, 20),
                    kcal: resultObj.kcal || 0,
                    protein: resultObj.protein || 0,
                    carbs: resultObj.carbs || 0,
                    fat: resultObj.fat || 0
                };

                const data = getDayData();
                data.meals.push(newMeal);
                saveDayData(data);

                inputField.value = '';
                
                // Öffne den entsprechenden Slot, um das Ergebnis zu zeigen
                const card = document.getElementById(`slotCard-${activeCategory}`);
                if(!card.classList.contains('expanded')) toggleSlotExpansion(activeCategory);

            } catch (error) {
                console.error(error);
                alert('Fehler bei der Analyse. Stimmt dein API Key?');
            } finally {
                btn.innerHTML = '<i class="fas fa-bolt"></i> Smart Scan';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
