<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriTrack Premium (Groq LPU Edition)</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS & Premium Design --- */
        :root {
            --primary: #10B981; 
            --primary-hover: #059669;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --protein-color: #3B82F6; 
            --carbs-color: #F59E0B;   
            --fat-color: #EF4444;     
            --voice-color: #3B82F6;   
            --voice-hover: #2563EB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            text-align: center;
            padding: 10px 0;
        }
        .header h1 {
            font-weight: 700;
            color: var(--primary);
            font-size: 28px;
            letter-spacing: -0.5px;
        }
        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            font-size: 15px;
            background-color: #F9FAFB;
            outline: none;
            resize: none;
        }
        input:focus, textarea:focus {
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }
        
        .input-group {
            margin-bottom: 12px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
        }
        button:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        button:disabled { background-color: #9CA3AF; cursor: not-allowed; box-shadow: none; }

        button.voice-btn {
            background-color: var(--voice-color);
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2);
            margin-bottom: 10px;
        }
        button.voice-btn:hover { background-color: var(--voice-hover); }

        .progress-wrapper { margin: 20px 0; }
        .progress-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        .progress-bar {
            height: 12px;
            background-color: #E5E7EB;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 10px;
            width: 0%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .macros-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        .macro-box {
            background-color: #F9FAFB;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #E5E7EB;
        }
        .macro-label { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 4px; }
        .macro-value { font-size: 18px; font-weight: 700; }
        .m-protein { color: var(--protein-color); }
        .m-carbs { color: var(--carbs-color); }
        .m-fat { color: var(--fat-color); }

        ul { list-style: none; padding: 0; }
        li {
            background-color: #F9FAFB;
            border: 1px solid #E5E7EB;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .meal-header { display: flex; justify-content: space-between; align-items: center; }
        .meal-time { font-size: 12px; color: var(--text-muted); font-weight: 600; }
        .meal-name { font-weight: 600; font-size: 15px; }
        .meal-kcal { font-weight: 700; color: var(--primary); font-size: 15px; }
        .meal-macros { display: flex; gap: 10px; font-size: 12px; flex-wrap: wrap; }
        .badge { padding: 2px 8px; border-radius: 20px; font-weight: 600; }
        .bg-protein { background-color: rgba(59, 130, 246, 0.1); color: var(--protein-color); }
        .bg-carbs { background-color: rgba(245, 158, 11, 0.1); color: var(--carbs-color); }
        .bg-fat { background-color: rgba(239, 68, 68, 0.1); color: var(--fat-color); }

        .settings-content { display: none; margin-top: 15px; }
        .toggle-btn { font-size: 12px; color: var(--primary); cursor: pointer; text-decoration: underline; }

        /* Edit Mode Layout optimiert */
        .edit-layout {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #f0fdf4;
            padding: 12px;
            border-radius: 8px;
            border: 1px dashed var(--primary);
        }
        .edit-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
        }
        .edit-grid div {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .edit-grid label {
            font-size: 9px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 2px;
        }
        .edit-grid input {
            padding: 6px 2px;
            font-size: 11px;
            text-align: center;
            border-radius: 6px;
            border: 1px solid #D1D5DB;
        }
        .edit-actions {
            display: flex;
            gap: 6px;
            margin-top: 5px;
        }
        .edit-actions button {
            padding: 8px;
            font-size: 12px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="header">
            <h1>NutriTrack</h1>
            <p>Dein smarter KI-Ernährungscoach (Groq Ultra-Speed)</p>
        </div>

        <!-- DASHBOARD -->
        <div class="card">
            <div class="card-title">
                Heutige Übersicht
                <span class="toggle-btn" onclick="toggleSettings()">Einstellungen ⚙️</span>
            </div>
            
            <div id="settingsArea" class="settings-content">
                <div class="input-group">
                    <label style="font-size: 12px; color: var(--text-muted);">Groq Cloud API Key</label>
                    <input type="password" id="apiKeyInput" placeholder="gsk_...">
                </div>
                <div class="input-group">
                    <label style="font-size: 12px; color: var(--text-muted);">Tagesziel (kcal)</label>
                    <input type="number" id="goalInput" placeholder="z.B. 2000">
                </div>
                <button onclick="saveSettings()" style="padding: 10px; font-size: 14px;">Einstellungen speichern</button>
                <hr style="border: 0; border-top: 1px solid #E5E7EB; margin: 15px 0;">
            </div>

            <div class="progress-wrapper">
                <div class="progress-labels">
                    <span><span id="totalKcalDisplay">0</span> kcal konsumiert</span>
                    <span style="color: var(--text-muted);"><span id="remainingKcal">0</span> kcal übrig</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar"></div>
                </div>
            </div>

            <div class="macros-grid">
                <div class="macro-box">
                    <div class="macro-label">Eiweiß</div>
                    <div class="macro-value m-protein"><span id="totalProtein">0</span>g</div>
                </div>
                <div class="macro-box">
                    <div class="macro-label">Kohlenhydrate</div>
                    <div class="macro-value m-carbs"><span id="totalCarbs">0</span>g</div>
                </div>
                <div class="macro-box">
                    <div class="macro-label">Fett</div>
                    <div class="macro-value m-fat"><span id="totalFett">0</span>g</div>
                </div>
            </div>
        </div>

        <!-- TRACKING AREA -->
        <div class="card">
            <div class="card-title">Mahlzeit tracken</div>
            <textarea id="mealInput" rows="3" placeholder="Z.B.: 1 Apfel, 2 Vollkorntoast und 1 Ei..."></textarea>
            <br><br>
            <button id="micBtn" class="voice-btn" onclick="startVoiceInput()">🎙️ Per Sprache eingeben</button>
            <button id="submitBtn" onclick="analyzeMeal()">Smart Scan ✨</button>
        </div>

        <!-- VERLAUF (LOG) -->
        <div class="card">
            <div class="card-title">
                Verlauf
                <span class="toggle-btn" style="color: var(--fat-color);" onclick="clearDataManually()">Zurücksetzen</span>
            </div>
            <ul id="logList"></ul>
        </div>

    </div>

    <script>
        let DEFAULT_GOAL = 2000;
        let speechRecognitionInstance = null;

        window.onload = function() {
            checkDailyReset();
            loadSettings();
            updateUI();
        };

        // --- SPRACHEINGABE FÜR IPHONE ---
        function startVoiceInput() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                alert("Spracherkennung wird von deinem Browser nicht unterstützt. Bitte nutze Safari oder Chrome auf dem iPhone.");
                return;
            }

            if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
                alert("WICHTIG FÜR IPHONE:\nDas Mikrofon ist aus Datenschutzgründen nur erlaubt, wenn die Seite über eine sichere Verbindung (HTTPS) läuft!\n\nBitte lade den Code auf GitHub Pages hoch.");
                return;
            }

            const micBtn = document.getElementById('micBtn');
            const mealInput = document.getElementById('mealInput');

            if (speechRecognitionInstance) {
                speechRecognitionInstance.stop();
                return;
            }

            speechRecognitionInstance = new SpeechRecognition();
            speechRecognitionInstance.lang = 'de-DE';
            speechRecognitionInstance.interimResults = false;
            speechRecognitionInstance.maxAlternatives = 1;

            speechRecognitionInstance.onstart = function() {
                micBtn.innerText = "🛑 Stoppen & Text einfügen...";
                micBtn.style.backgroundColor = "#EF4444";
            };

            speechRecognitionInstance.onresult = function(event) {
                const spokenText = event.results[0][0].transcript;
                if (mealInput.value.trim() !== "") {
                    mealInput.value += " " + spokenText;
                } else {
                    mealInput.value = spokenText;
                }
            };

            speechRecognitionInstance.onerror = function(event) {
                console.error("Sprachfehler:", event.error);
                if (event.error === 'not-allowed') {
                    alert("Mikrofon-Zugriff verweigert! Bitte gehe in die iPhone-Einstellungen -> Safari -> Mikrofon und erlaube den Zugriff für diese Webseite.");
                } else if(event.error !== 'no-speech') {
                    alert("Fehler bei Spracheingabe: " + event.error);
                }
            };

            speechRecognitionInstance.onend = function() {
                micBtn.innerText = "🎙️ Per Sprache eingeben";
                micBtn.style.backgroundColor = "var(--voice-color)";
                speechRecognitionInstance = null;
            };

            speechRecognitionInstance.start();
        }

        // --- BEARBEITEN & KORREKTUR-SPEICHER LOGIK ---
        function toggleEdit(index) {
            const log = JSON.parse(localStorage.getItem('meal_log')) || [];
            log[index].isEditing = !log[index].isEditing;
            localStorage.setItem('meal_log', JSON.stringify(log));
            updateUI();
        }

        function saveEdit(index) {
            const log = JSON.parse(localStorage.getItem('meal_log')) || [];
            const item = log[index];

            // Neue Werte aus den Inputs auslesen
            const newAmount = document.getElementById(`editAmount-${index}`).value.trim();
            const newKcal = Math.round(Number(document.getElementById(`editKcal-${index}`).value));
            const newProtein = Number(document.getElementById(`editProtein-${index}`).value);
            const newCarbs = Number(document.getElementById(`editCarbs-${index}`).value);
            const newFat = Number(document.getElementById(`editFat-${index}`).value);

            // 1. Im heutigen Verlauf updaten
            item.amount = newAmount;
            item.kcal = newKcal;
            item.protein = newProtein;
            item.carbs = newCarbs;
            item.fett = newFat;
            item.isEditing = false;

            log[index] = item;
            localStorage.setItem('meal_log', JSON.stringify(log));

            // 2. Im Gedächtnis inklusive MENGE für den Dreisatz speichern!
            const dictionary = JSON.parse(localStorage.getItem('food_dictionary')) || {};
            const foodKey = item.name.toLowerCase().trim();
            
            dictionary[foodKey] = {
                amount: newAmount, // Hier merken wir uns jetzt ob es für '100g' oder '1 Stück' gilt!
                kcal: newKcal,
                protein: newProtein,
                carbs: newCarbs,
                fett: newFat
            };
            localStorage.setItem('food_dictionary', JSON.stringify(dictionary));

            updateUI();
        }

        function updateUI() {
            const log = JSON.parse(localStorage.getItem('meal_log')) || [];
            let totalKcal = 0, totalProtein = 0, totalCarbs = 0, totalFett = 0;
            const logList = document.getElementById('logList');
            logList.innerHTML = ''; 

            log.forEach((item, index) => {
                totalKcal += Math.round(Number(item.kcal || 0));
                totalProtein += Number(item.protein || 0);
                totalCarbs += Number(item.carbs || 0);
                totalFett += Number(item.fett || 0);

                const li = document.createElement('li');

                if (item.isEditing) {
                    li.innerHTML = `
                        <div class="edit-layout">
                            <strong style="font-size:13px; color:var(--primary)">${item.name} anpassen:</strong>
                            <div class="edit-grid">
                                <div><label>Menge</label><input type="text" id="editAmount-${index}" value="${item.amount || '100g'}"></div>
                                <div><label>kcal</label><input type="number" id="editKcal-${index}" value="${Math.round(item.kcal)}"></div>
                                <div><label>Eiweiß</label><input type="number" step="0.1" id="editProtein-${index}" value="${item.protein}"></div>
                                <div><label>Kohlenh.</label><input type="number" step="0.1" id="editCarbs-${index}" value="${item.carbs}"></div>
                                <div><label>Fett</label><input type="number" step="0.1" id="editFat-${index}" value="${item.fett}"></div>
                            </div>
                            <div class="edit-actions">
                                <button onclick="saveEdit(${index})" style="background-color: var(--primary);">Speichern & Merken 💾</button>
                                <button onclick="toggleEdit(${index})" style="background-color: var(--text-muted);">Abbrechen</button>
                            </div>
                        </div>
                    `;
                } else {
                    li.innerHTML = `
                        <div class="meal-header">
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <span class="meal-time">${item.time}</span>
                                <span class="meal-name">${item.name} <span style="font-size:11px; color:var(--text-muted)">(${item.amount || '1 Portion'})</span></span>
                            </div>
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <span class="meal-kcal">${Math.round(item.kcal)} kcal</span>
                                <span style="cursor:pointer; font-size:14px;" onclick="toggleEdit(${index})">✏️</span>
                            </div>
                        </div>
                        <div class="meal-macros">
                            <span class="badge bg-protein">E: ${Number(item.protein).toFixed(1)}g</span>
                            <span class="badge bg-carbs">K: ${Number(item.carbs).toFixed(1)}g</span>
                            <span class="badge bg-fat">F: ${Number(item.fett).toFixed(1)}g</span>
                        </div>
                    `;
                }
                logList.appendChild(li);
            });

            document.getElementById('totalKcalDisplay').innerText = totalKcal;
            document.getElementById('totalProtein').innerText = totalProtein.toFixed(1);
            document.getElementById('totalCarbs').innerText = totalCarbs.toFixed(1);
            document.getElementById('totalFett').innerText = totalFett.toFixed(1);

            let remaining = DEFAULT_GOAL - totalKcal;
            if (remaining < 0) remaining = 0;
            document.getElementById('remainingKcal').innerText = remaining;

            let percentage = (totalKcal / DEFAULT_GOAL) * 100;
            if (percentage > 100) percentage = 100;
            
            const progressBar = document.getElementById('progressBar');
            progressBar.style.width = percentage + '%';
            
            if(totalKcal > DEFAULT_GOAL) {
                progressBar.style.background = 'linear-gradient(90deg, #EF4444, #F87171)';
            } else {
                progressBar.style.background = 'linear-gradient(90deg, var(--primary), #34D399)';
            }
        }

        // --- SETTINGS & BASICS ---
        function toggleSettings() {
            const area = document.getElementById('settingsArea');
            area.style.display = area.style.display === 'block' ? 'none' : 'block';
        }

        function saveSettings() {
            const key = document.getElementById('apiKeyInput').value.trim();
            const goal = document.getElementById('goalInput').value.trim();
            if(key) localStorage.setItem('groq_api_key', key);
            if(goal) localStorage.setItem('daily_kcal_goal', goal);
            DEFAULT_GOAL = goal ? parseInt(goal) : 2000;
            toggleSettings();
            updateUI();
        }

        function loadSettings() {
            const key = localStorage.getItem('groq_api_key');
            const goal = localStorage.getItem('daily_kcal_goal');
            if(key) document.getElementById('apiKeyInput').value = key;
            if(goal) {
                document.getElementById('goalInput').value = goal;
                DEFAULT_GOAL = parseInt(goal);
            }
        }

        function checkDailyReset() {
            const todayStr = new Date().toDateString();
            const lastSavedDate = localStorage.getItem('last_saved_date');
            if (lastSavedDate !== todayStr) {
                localStorage.setItem('meal_log', JSON.stringify([]));
                localStorage.setItem('last_saved_date', todayStr);
            }
        }

        function clearDataManually() {
            if(confirm("Möchtest du die heutigen Einträge wirklich löschen?")) {
                localStorage.setItem('meal_log', JSON.stringify([]));
                updateUI();
            }
        }

        // --- GROQ KI LOGIK MIT INTELLIGENTEM DREISATZ-SPEICHER ---
        async function analyzeMeal() {
            const apiKey = localStorage.getItem('groq_api_key');
            if(!apiKey) {
                alert("Bitte klappe zuerst die Einstellungen ⚙️ aus und hinterlege deinen GROQ Cloud API Key!");
                return;
            }

            const mealText = document.getElementById('mealInput').value.trim();
            if(!mealText) return;

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Groq analysiert... ⚡";

            const now = new Date();
            const currentTimeStr = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

            const customDictionary = localStorage.getItem('food_dictionary') || '{}';

            const systemPrompt = `Du bist ein präziser Daten-Extraktor für Lebensmittel. Deine Aufgabe ist es, aus dem folgenden Text alle Lebensmittel zu extrahieren und deren Nährwerte basierend auf der genannten Menge zu schätzen.

WICHTIGE BENUTZERREGELN (Lern-Modus):
Der Benutzer hat in der Vergangenheit manuelle Korrekturen vorgenommen. In der folgenden JSON-Liste siehst du Lebensmittel mit den Nährwerten für eine ganz bestimmte Basismenge ("amount").
Wenn das eingegebene Lebensmittel mit einem Eintrag aus dieser Liste übereinstimmt, verwende diesen Eintrag als absolut exakte Referenzbasis und berechne (skaliere) die neuen Nährwerte per Dreisatz exakt proportional auf die vom Benutzer aktuell geforderte Menge hoch oder runter!
${customDictionary}

Allgemeine Schätz-Regeln:
1. Wenn im Text keine spezifische Marke genannt wird, nimm hypothetische Standardwerte von deutschen Supermarkt-Eigenmarken (z.B. ja!, Gut & Günstig).
2. Eine Zahl vor dem Lebensmittel definiert die Menge (entweder in Gramm/Milliliter oder als Stück/Scheibe). 
3. Wenn keine Zahl genannt wird, nimm standardmäßig die Menge "1 Stück" oder eine übliche Einzelmenge an.
4. Berechne die Nährwerte (kcal, protein, carbs, fett) proportional für die gesamte angegebene Menge (NICHT pro 100g).

Ausgabe-Format:
Gib ausschließlich das reine JSON-Objekt zurück. Keine Erklärungen, kein Smalltalk, keine Markdown-Formatierung.

{
  "items": [
    {
      "name": "Magerquark",
      "brand": "Eigenmarke",
      "amount": "250g",
      "kcal": 170,
      "protein": 30,
      "carbs": 10,
      "fett": 1
    }
  ]
}`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "meta-llama/llama-4-scout-17b-16e-instruct", 
                        response_format: { "type": "json_object" }, 
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: mealText }
                        ],
                        temperature: 0.0 
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    alert(`Groq-Fehler (Status ${response.status}):\n\n${errorText}`);
                    return;
                }

                const data = await response.json();
                let aiResponseText = data.choices[0].message.content.trim();
                
                const parsedData = JSON.parse(aiResponseText);
                const parsedItems = parsedData.items || [];

                let currentLog = JSON.parse(localStorage.getItem('meal_log')) || [];

                parsedItems.forEach(item => {
                    item.time = currentTimeStr;
                    item.isEditing = false;
                    currentLog.push(item);
                });

                localStorage.setItem('meal_log', JSON.stringify(currentLog));
                updateUI();
                document.getElementById('mealInput').value = '';

            } catch (error) {
                console.error("Fehler:", error);
                alert("Fehler beim Verarbeiten: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Smart Scan ✨";
            }
        }
    </script>
</body>
</html>
