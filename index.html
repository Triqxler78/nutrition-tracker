<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NutriTrack Premium — iOS Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* --- Premium iOS Design System --- */
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-text-main: #000000;
            --ios-text-muted: #8E8E93;
            --ios-text-light: #AEAEB2;
            
            --primary: #34C759;      /* iOS Green */
            --primary-light: #E8F9EC;
            --accent-blue: #007AFF;  /* iOS Blue */
            --accent-orange: #FF9500;/* iOS Orange */
            --accent-red: #FF3B30;   /* iOS Red */
            --accent-teal: #5AC8FA;  /* iOS Teal */
            
            --protein-color: var(--accent-blue);
            --carbs-color: var(--accent-orange);
            --fat-color: var(--accent-red);
            
            --border-color: #E5E5EA;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        /* --- AUTOMATISCHER DARKMODE FÜR OLED --- */
        @media (prefers-color-scheme: dark) {
            :root {
                --ios-bg: #000000;         /* Tiefschwarz für OLED */
                --ios-card: #1C1C1E;       /* Dunkelgrau für Karten */
                --ios-text-main: #FFFFFF;
                --ios-text-muted: #8E8E93;
                --border-color: #38383A;
                --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
                --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.3);
                --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.4);
            }
            .meal-slot-content {
                background: #121212 !important; 
            }
            .date-switcher {
                background: rgba(118, 118, 128, 0.24) !important;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--ios-bg);
            color: var(--ios-text-main); 

            padding-top: calc(env(safe-area-inset-top) + 20px);
            padding-bottom: calc(env(safe-area-inset-bottom) + 20px);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);

            box-sizing: border-box; 
            overflow-x: hidden; 
            width: 100vw;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto; 
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px 16px 40px 16px;
        }

        /* --- CALENDAR NAVIGATION HEADER --- */
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 4px 0 4px;
        }

        .header-nav h1 {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .date-switcher {
            display: flex;
            align-items: center;
            background: rgba(118, 118, 128, 0.12);
            padding: 4px;
            border-radius: 99px;
            gap: 4px;
        }

        .date-btn {
            background: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-blue);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .date-btn:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .date-display {
            font-size: 14px;
            font-weight: 600;
            padding: 0 12px;
            min-width: 90px;
            text-align: center;
        }

        .top-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: var(--ios-card);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-blue);
            font-size: 18px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .icon-btn:active {
            transform: scale(0.92);
        }

        /* --- MAIN DASHBOARD CARD --- */
        .dashboard-card {
            background: var(--ios-card);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .main-stats-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            width: 100%;
            align-items: center;
            margin-bottom: 24px;
        }

        .stat-column {
            text-align: center;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--ios-text-main);
        }

        .stat-label {
            font-size: 12px;
            color: var(--ios-text-muted);
            margin-top: 2px;
            font-weight: 500;
        }

        .progress-ring-container {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .progress-ring-circle {
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            transition: stroke-dashoffset 0.5s ease-in-out;
        }

        .progress-text-center {
            position: absolute;
            text-align: center;
        }

        .progress-text-center .number {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
            display: block;
            line-height: 1;
        }

        .progress-text-center .label {
            font-size: 12px;
            color: var(--ios-text-muted);
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .macro-bars-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .macro-bar-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .macro-bar-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 600;
        }

        .macro-name {
            color: var(--ios-text-muted);
        }

        .macro-numbers {
            color: var(--ios-text-main);
        }

        .macro-progress-bg {
            height: 8px;
            background: var(--ios-bg);
            border-radius: 99px;
            overflow: hidden;
            width: 100%;
        }

        .macro-progress-fill {
            height: 100%;
            border-radius: 99px;
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- TRACKER CARD --- */
        .tracker-card {
            background: var(--ios-card);
            border-radius: 24px;
            padding: 20px;
            box-shadow: var(--shadow-md);
        }

        .section-title-ios {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        textarea {
            width: 100%;
            border: 1px solid var(--border-color);
            background: var(--ios-bg);
            color: var(--ios-text-main);
            border-radius: 16px;
            padding: 14px;
            font-size: 15px;
            outline: none;
            resize: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--accent-blue);
        }

        .action-row {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        .btn-ios {
            flex: 1;
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2);
            transition: all 0.2s;
        }

        .btn-ios:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        .btn-ios:disabled {
            background: var(--ios-text-light);
            box-shadow: none;
            cursor: not-allowed;
        }

        /* --- MEAL ACCORDION SLOTS (iOS-Style) --- */
        .slots-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .meal-slot-card {
            background: var(--ios-card);
            border-radius: 20px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: all 0.25s;
        }

        .meal-slot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            user-select: none;
        }

        .meal-slot-header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .meal-slot-icon-wrapper {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background-color: rgba(0, 122, 255, 0.12);
            color: var(--accent-blue);
        }

        .meal-slot-title {
            font-size: 17px;
            font-weight: 600;
        }

        .meal-slot-subtitle {
            font-size: 12px;
            color: var(--ios-text-muted);
            margin-top: 1px;
        }

        .meal-slot-header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .meal-slot-kcal-badge {
            font-size: 15px;
            font-weight: 700;
            color: var(--ios-text-main);
        }

        .meal-slot-content {
            border-top: 1px solid var(--border-color);
            background: #FAFAFC;
            display: flex;
            flex-direction: column;
            padding: 8px 16px;
        }

        .food-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .food-item-row:last-child {
            border-bottom: none;
        }

        .food-details {
            flex: 1;
        }

        .food-title {
            font-size: 15px;
            font-weight: 600;
        }

        .food-subinfo {
            font-size: 12px;
            color: var(--ios-text-muted);
            margin-top: 2px;
            display: flex;
            gap: 8px;
        }

        .food-row-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .food-kcal {
            font-size: 15px;
            font-weight: 600;
        }

        .food-actions {
            display: flex;
            gap: 8px;
            font-size: 16px;
        }

        .food-action-icon {
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .food-action-icon.edit { color: var(--accent-blue); }
        .food-action-icon.delete { color: var(--accent-red); }
        .food-action-icon:hover { background: rgba(0,0,0,0.05); }

        /* --- SETTINGS AREA (MODAL STYLE) --- */
        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 999;
            display: none;
            justify-content: center;
            align-items: flex-end;
        }

        .settings-overlay.show {
            display: flex;
        }

        .settings-sheet {
            background: var(--ios-card);
            width: 100%;
            max-width: 480px;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .input-group-ios {
            margin-bottom: 16px;
        }

        .input-group-ios label {
            font-size: 13px;
            color: var(--ios-text-muted);
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            text-transform: uppercase;
            padding-left: 4px;
        }

        .input-group-ios input {
            width: 100%;
            padding: 12px 14px;
            background: var(--ios-bg);
            color: var(--ios-text-main);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
        }

        .input-group-ios input:focus {
            border-color: var(--accent-blue);
        }

        /* --- EDITING INLINE FORM --- */
        .inline-edit-box {
            background: var(--ios-card);
            border-radius: 12px;
            padding: 12px;
            border: 1px dashed var(--accent-blue);
            margin: 8px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .inline-edit-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px; 
        }

        .inline-edit-box input {
            padding: 6px 4px;
            background: var(--ios-bg);
            color: var(--ios-text-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            width: 100%;
            min-width: 0; 
        }

        /* --- HELPER STYLES --- */
        .empty-slot-text {
            font-size: 13px;
            color: var(--ios-text-muted);
            text-align: center;
            padding: 12px 0;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="header-nav">
            <h1>Heute</h1>
            <div class="top-actions">
                <div class="date-switcher">
                    <button class="date-btn" onclick="changeDate(-1)"><i class="fas fa-chevron-left"></i></button>
                    <span class="date-display" id="dateLabel">15. Juni</span>
                    <button class="date-btn" onclick="changeDate(1)"><i class="fas fa-chevron-right"></i></button>
                </div>
                <button class="icon-btn" onclick="openSettings()"><i class="fas fa-cog"></i></button>
            </div>
        </div>

        <div class="dashboard-card">
            <div class="main-stats-grid">
                <div class="stat-column">
                    <div class="stat-value" id="totalGegessen">0</div>
                    <div class="stat-label">Gegessen</div>
                </div>
                
                <div class="progress-ring-container">
                    <svg width="150" height="150">
                        <circle stroke="var(--border-color)" stroke-width="10" fill="transparent" r="64" cx="75" cy="75"/>
                        <circle class="progress-ring-circle" id="progressCircle" stroke="var(--primary)" stroke-width="10" stroke-linecap="round" fill="transparent" r="64" cx="75" cy="75" stroke-dasharray="402.12" stroke-dashoffset="402.12"/>
                    </svg>
                    <div class="progress-text-center">
                        <span class="number" id="totalUebrig">2000</span>
                        <span class="label">Übrig</span>
                    </div>
                </div>

                <div class="stat-column" style="position: relative;">
                    <div class="stat-value" id="totalVerbrannt" style="cursor:pointer; color: var(--accent-teal);" onclick="promptBurnedCalories()">0</div>
                    <div class="stat-label">Verbrannt <i class="fas fa-plus-circle" style="font-size:10px;"></i></div>
                </div>
            </div>

            <div class="macro-bars-container">
                <div class="macro-bar-row">
                    <div class="macro-bar-header">
                        <span class="macro-name">Kohlenhydrate</span>
                        <span class="macro-numbers"><span id="macroCarbsCurrent">0</span> / <span id="macroCarbsTarget">250</span> g</span>
                    </div>
                    <div class="macro-progress-bg">
                        <div class="macro-progress-fill" id="barCarbs" style="background-color: var(--carbs-color);"></div>
                    </div>
                </div>
                <div class="macro-bar-row">
                    <div class="macro-bar-header">
                        <span class="macro-name">Eiweiß</span>
                        <span class="macro-numbers"><span id="macroProteinCurrent">0</span> / <span id="macroProteinTarget">120</span> g</span>
                    </div>
                    <div class="macro-progress-bg">
                        <div class="macro-progress-fill" id="barProtein" style="background-color: var(--protein-color);"></div>
                    </div>
                </div>
                <div class="macro-bar-row">
                    <div class="macro-bar-header">
                        <span class="macro-name">Fett</span>
                        <span class="macro-numbers"><span id="macroFatCurrent">0</span> / <span id="macroFatTarget">65</span> g</span>
                    </div>
                    <div class="macro-progress-bg">
                        <div class="macro-progress-fill" id="barFat" style="background-color: var(--fat-color);"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tracker-card">
            <div class="section-title-ios"><i class="fas fa-sparkles" style="color: var(--accent-orange);"></i> Mahlzeit tracken</div>
            
            <div style="margin-bottom: 12px; display: flex; align-items: center; gap: 10px;">
                <label for="mealTimeInput" style="font-size: 14px; font-weight: 600; color: var(--ios-text-muted);">Uhrzeit:</label>
                <input type="time" id="mealTimeInput" style="flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--ios-bg); color: var(--ios-text-main); font-size: 15px;">
            </div>

            <textarea id="mealInput" rows="3" placeholder="Z.B. 1 Banane, 50g Haferflocken und 200ml Milch..."></textarea>
            
            <div class="action-row">
                <button id="submitBtn" class="btn-ios" onclick="analyzeMeal()">
                    <i class="fas fa-bolt"></i> Smart Scan
                </button>
            </div>
        </div>

        <div class="slots-container">
            <div class="meal-slot-card" id="slotCard-Timeline">
                <div class="meal-slot-header" style="cursor: default;">
                    <div class="meal-slot-header-left">
                        <div class="meal-slot-icon-wrapper"><i class="fas fa-list-ul"></i></div>
                        <div>
                            <div class="meal-slot-title">Tagesverlauf</div>
                            <div class="meal-slot-subtitle" id="slotSub-Timeline">Keine Einträge</div>
                        </div>
                    </div>
                    <div class="meal-slot-header-right">
                        <div class="meal-slot-kcal-badge"><span id="slotKcal-Timeline">0</span> kcal</div>
                    </div>
                </div>
                <div class="meal-slot-content" id="slotContent-Timeline"></div>
            </div>
        </div>

    </div>

    <div class="settings-overlay" id="settingsOverlay" onclick="closeSettings()">
        <div class="settings-sheet" onclick="event.stopPropagation()">
            <div class="settings-header">
                <h2 style="font-size: 20px; font-weight: 700;">Einstellungen</h2>
                <button class="icon-btn" style="width:32px; height:32px; font-size:14px;" onclick="closeSettings()"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="input-group-ios">
                <label>🔑 Groq Cloud API Key</label>
                <input type="password" id="apiKeyInput" placeholder="gsk_...">
            </div>
            <div class="input-group-ios">
                <label>🎯 Tagesziel (kcal)</label>
                <input type="number" id="goalInput" placeholder="z.B. 2000" min="500" max="5000">
            </div>

            <div class="input-group-ios">
                <label>⚖️ Makro-Verteilung (%)</label>
                <div style="display: flex; gap: 8px;">
                    <input type="number" id="pctCarbs" placeholder="KH %" title="Kohlenhydrate (%)" min="0" max="100">
                    <input type="number" id="pctProtein" placeholder="P %" title="Protein (%)" min="0" max="100">
                    <input type="number" id="pctFat" placeholder="F %" title="Fett (%)" min="0" max="100">
                </div>
                <div id="macroWarning" style="color: var(--accent-red); font-size: 12px; margin-top: 6px; display: none; font-weight: 500;">Die Summe der Makros muss 100% ergeben.</div>
            </div>

            <button class="btn-ios" style="margin-top: 10px; width: 100%;" onclick="saveSettings()">
                <i class="fas fa-check-circle"></i> Speichern & Schließen
            </button>
            
            <button class="btn-ios" style="margin-top: 12px; width: 100%; background: var(--accent-red); box-shadow:none;" onclick="clearAllData()">
                <i class="fas fa-trash-alt"></i> Alle lokalen Daten löschen
            </button>
        </div>
    </div>

    <script>
        let DEFAULT_GOAL = 2000;
        let MACRO_CARBS = 50;
        let MACRO_PROTEIN = 25;
        let MACRO_FAT = 25;
        let viewedDate = new Date(); 

        window.onload = function() {
            migrateOldSchema();
            loadSettings();
            
            // Setze die aktuelle Uhrzeit in das Time-Input-Feld
            document.getElementById('mealTimeInput').value = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
            
            updateUI();
        };

        function getFormattedDateKey(dateObj) {
            return dateObj.toISOString().split('T')[0];
        }

        function getHumanReadableDateLabel(dateObj) {
            const today = new Date();
            const yesterday = new Date();
            yesterday.setDate(today.getDate() - 1);
            
            if (getFormattedDateKey(dateObj) === getFormattedDateKey(today)) return 'Heute';
            if (getFormattedDateKey(dateObj) === getFormattedDateKey(yesterday)) return 'Gestern';
            
            return dateObj.toLocaleDateString('de-DE', { day: 'numeric', month: 'short' });
        }

        function changeDate(daysOffset) {
            viewedDate.setDate(viewedDate.getDate() + daysOffset);
            updateUI();
        }

        function migrateOldSchema() {
            const oldLog = localStorage.getItem('meal_log');
            if (oldLog) {
                try {
                    const parsed = JSON.parse(oldLog);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        const todayKey = getFormattedDateKey(new Date());
                        let database = JSON.parse(localStorage.getItem('meal_log_v2')) || {};
                        if (!database[todayKey]) database[todayKey] = { meals: [], burned: 0 };
                        
                        parsed.forEach(item => {
                            if (!item.time) item.time = "12:00"; // Fallback Time
                            database[todayKey].meals.push(item);
                        });
                        localStorage.setItem('meal_log_v2', JSON.stringify(database));
                    }
                    localStorage.removeItem('meal_log');
                } catch(e) { console.error("Migration error:", e); }
            }
        }

        function getDayData() {
            const dateKey = getFormattedDateKey(viewedDate);
            let database = JSON.parse(localStorage.getItem('meal_log_v2')) || {};
            if (!database[dateKey]) {
                database[dateKey] = { meals: [], burned: 0 };
            }
            return database[dateKey];
        }

        function saveDayData(dayDataObj) {
            const dateKey = getFormattedDateKey(viewedDate);
            let database = JSON.parse(localStorage.getItem('meal_log_v2')) || {};
            database[dateKey] = dayDataObj;
            localStorage.setItem('meal_log_v2', JSON.stringify(database));
        }

        function promptBurnedCalories() {
            const currentData = getDayData();
            const val = prompt("Verbrannte Kalorien (Aktivitäten/Sport) hinzufügen:", currentData.burned || 0);
            if (val !== null) {
                const parsedNum = Math.max(0, parseInt(val) || 0);
                currentData.burned = parsedNum;
                saveDayData(currentData);
                updateUI();
            }
        }

        function updateUI() {
            const dayData = getDayData();
            const meals = dayData.meals || [];
            const burned = dayData.burned || 0;
            
            const dateKey = getFormattedDateKey(viewedDate);
            document.getElementById('dateLabel').innerText = getHumanReadableDateLabel(viewedDate);
            document.querySelector('.header-nav h1').innerText = getHumanReadableDateLabel(viewedDate);

            // Prozentuale Berechnung der Makros
            const targetCarbs = Math.round((DEFAULT_GOAL * (MACRO_CARBS / 100)) / 4);
            const targetProtein = Math.round((DEFAULT_GOAL * (MACRO_PROTEIN / 100)) / 4);
            const targetFat = Math.round((DEFAULT_GOAL * (MACRO_FAT / 100)) / 9);

            document.getElementById('macroCarbsTarget').innerText = targetCarbs;
            document.getElementById('macroProteinTarget').innerText = targetProtein;
            document.getElementById('macroFatTarget').innerText = targetFat;

            let aggregateKcal = 0, aggregateProtein = 0, aggregateCarbs = 0, aggregateFat = 0;
            let htmlContent = '';

            // Chronologische Sortierung
            meals.sort((a, b) => {
                const timeA = a.time || '00:00';
                const timeB = b.time || '00:00';
                return timeA.localeCompare(timeB);
            });

            meals.forEach((item, index) => {
                const itemKcal = Math.round(Number(item.kcal || 0));
                const itemProtein = Number(item.protein || 0);
                const itemCarbs = Number(item.carbs || 0);
                const itemFat = Number(item.fett || 0);

                aggregateKcal += itemKcal;
                aggregateProtein += itemProtein;
                aggregateCarbs += itemCarbs;
                aggregateFat += itemFat;

                if (item.isEditing) {
                    htmlContent += `
                        <div class="inline-edit-box" onclick="event.stopPropagation()">
                            <div style="font-size:12px; font-weight:600; color:var(--accent-blue);"><i class="fas fa-edit"></i> ${item.name} bearbeiten</div>
                            <input type="time" id="editTime-${index}" value="${item.time || ''}" style="width: auto; margin-bottom: 4px;">
                            <div class="inline-edit-grid">
                                <input type="text" id="editAmount-${index}" value="${item.amount || '100g'}" placeholder="Menge">
                                <input type="number" id="editKcal-${index}" value="${itemKcal}" placeholder="kcal">
                                <input type="number" step="0.1" id="editProt-${index}" value="${itemProtein}" placeholder="P">
                            </div>
                            <div class="inline-edit-grid">
                                <input type="number" step="0.1" id="editCarb-${index}" value="${itemCarbs}" placeholder="KH">
                                <input type="number" step="0.1" id="editFat-${index}" value="${itemFat}" placeholder="F">
                            </div>
                            <div style="display:flex; gap:8px; margin-top:8px;">
                                <button class="btn-ios" style="flex:1; padding:10px; font-size:14px; border-radius:10px; background:var(--primary);" onclick="saveItemInline(${index})"><i class="fas fa-check"></i></button>
                                <button class="btn-ios" style="padding:10px 16px; font-size:14px; border-radius:10px; background:var(--ios-text-muted);" onclick="toggleEditMode(${index})"><i class="fas fa-times"></i></button>
                            </div>
                        </div>
                    `;
                } else {
                    htmlContent += `
                        <div class="food-item-row" onclick="event.stopPropagation()">
                            <div style="font-size: 14px; font-weight: 700; color: var(--accent-blue); width: 45px; flex-shrink: 0;">${item.time || '--:--'}</div>
                            <div class="food-details">
                                <div class="food-title">${item.name}</div>
                                <div class="food-subinfo">
                                    <span>${item.amount || '1 Portion'}</span>
                                    <span>•</span>
                                    <span>E: ${itemProtein.toFixed(1)}g KH: ${itemCarbs.toFixed(1)}g F: ${itemFat.toFixed(1)}g</span>
                                </div>
                            </div>
                            <div class="food-row-right">
                                <div class="food-kcal">${itemKcal} kcal</div>
                                <div class="food-actions">
                                    <i class="fas fa-pencil food-action-icon edit" title="Bearbeiten" onclick="toggleEditMode(${index})"></i>
                                    <i class="fas fa-trash food-action-icon delete" title="Löschen" onclick="deleteItemRow(${index})"></i>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });

            document.getElementById('slotKcal-Timeline').innerText = aggregateKcal;
            document.getElementById('slotSub-Timeline').innerText = meals.length === 1 ? '1 Eintrag' : `${meals.length} Einträge`;
            
            const container = document.getElementById('slotContent-Timeline');
            if (meals.length === 0) {
                container.innerHTML = `<div class="empty-slot-text">Keine Einträge für heute</div>`;
            } else {
                container.innerHTML = htmlContent;
            }

            document.getElementById('totalGegessen').innerText = aggregateKcal;
            document.getElementById('totalVerbrannt').innerText = burned;

            let remainingKcal = DEFAULT_GOAL - aggregateKcal + burned;
            const remainingDisplayElement = document.getElementById('totalUebrig');
            remainingDisplayElement.innerText = Math.abs(remainingKcal);
            
            const labelElement = document.querySelector('.progress-text-center .label');
            if (remainingKcal < 0) {
                labelElement.innerText = 'Über Ziel';
                labelElement.style.color = 'var(--accent-red)';
            } else {
                labelElement.innerText = 'Übrig';
                labelElement.style.color = 'var(--ios-text-muted)';
            }

            let progressPercent = aggregateKcal / (DEFAULT_GOAL + burned);
            if (isNaN(progressPercent) || progressPercent < 0) progressPercent = 0;
            if (progressPercent > 1) progressPercent = 1;

            const circleElement = document.getElementById('progressCircle');
            const radius = circleElement.r.baseVal.value;
            const circumference = 2 * Math.PI * radius;
            const strokeDashoffset = circumference - (progressPercent * circumference);
            circleElement.style.strokeDashoffset = strokeDashoffset;

            if (remainingKcal < 0) {
                circleElement.style.stroke = 'var(--accent-red)';
            } else {
                circleElement.style.stroke = 'var(--primary)';
            }

            document.getElementById('macroCarbsCurrent').innerText = aggregateCarbs.toFixed(1);
            document.getElementById('macroProteinCurrent').innerText = aggregateProtein.toFixed(1);
            document.getElementById('macroFatCurrent').innerText = aggregateFat.toFixed(1);

            document.getElementById('barCarbs').style.width = Math.min(100, (aggregateCarbs / targetCarbs) * 100) + '%';
            document.getElementById('barProtein').style.width = Math.min(100, (aggregateProtein / targetProtein) * 100) + '%';
            document.getElementById('barFat').style.width = Math.min(100, (aggregateFat / targetFat) * 100) + '%';
        }

        function toggleEditMode(index) {
            const dayData = getDayData();
            dayData.meals[index].isEditing = !dayData.meals[index].isEditing;
            saveDayData(dayData);
            updateUI();
        }

        function saveItemInline(index) {
            const dayData = getDayData();
            const item = dayData.meals[index];

            const tm = document.getElementById(`editTime-${index}`)?.value || item.time;
            const amt = document.getElementById(`editAmount-${index}`)?.value.trim() || item.amount;
            const kc = Math.round(Number(document.getElementById(`editKcal-${index}`)?.value || item.kcal));
            const pr = Number(document.getElementById(`editProt-${index}`)?.value || item.protein);
            const cb = Number(document.getElementById(`editCarb-${index}`)?.value || item.carbs);
            const ft = Number(document.getElementById(`editFat-${index}`)?.value || item.fett);

            item.time = tm;
            item.amount = amt;
            item.kcal = kc;
            item.protein = pr;
            item.carbs = cb;
            item.fett = ft;
            item.isEditing = false;

            dayData.meals[index] = item;
            saveDayData(dayData);

            const dictionary = JSON.parse(localStorage.getItem('food_dictionary')) || {};
            dictionary[item.name.toLowerCase().trim()] = { amount: amt, kcal: kc, protein: pr, carbs: cb, fett: ft };
            localStorage.setItem('food_dictionary', JSON.stringify(dictionary));

            updateUI();
        }

        function deleteItemRow(index) {
            const dayData = getDayData();
            if (confirm(`"${dayData.meals[index].name}" wirklich entfernen?`)) {
                dayData.meals.splice(index, 1);
                saveDayData(dayData);
                updateUI();
            }
        }

        function openSettings() {
            document.getElementById('settingsOverlay').classList.add('show');
        }

        function closeSettings() {
            document.getElementById('settingsOverlay').classList.remove('show');
        }

        function saveSettings() {
            const key = document.getElementById('apiKeyInput').value.trim();
            const goal = document.getElementById('goalInput').value.trim();
            
            const pCarbs = parseInt(document.getElementById('pctCarbs').value) || 0;
            const pProt = parseInt(document.getElementById('pctProtein').value) || 0;
            const pFat = parseInt(document.getElementById('pctFat').value) || 0;

            if (pCarbs + pProt + pFat !== 100) {
                document.getElementById('macroWarning').style.display = 'block';
                return; 
            }
            document.getElementById('macroWarning').style.display = 'none';

            if(key) localStorage.setItem('groq_api_key', key);
            if(goal) {
                localStorage.setItem('daily_kcal_goal', goal);
                DEFAULT_GOAL = parseInt(goal);
            }
            
            localStorage.setItem('macro_pct_carbs', pCarbs);
            localStorage.setItem('macro_pct_protein', pProt);
            localStorage.setItem('macro_pct_fat', pFat);
            
            MACRO_CARBS = pCarbs;
            MACRO_PROTEIN = pProt;
            MACRO_FAT = pFat;

            closeSettings();
            updateUI();
        }

        function loadSettings() {
            const key = localStorage.getItem('groq_api_key');
            const goal = localStorage.getItem('daily_kcal_goal');
            
            const storedCarbs = localStorage.getItem('macro_pct_carbs');
            const storedProt = localStorage.getItem('macro_pct_protein');
            const storedFat = localStorage.getItem('macro_pct_fat');

            if(key) document.getElementById('apiKeyInput').value = key;
            if(goal) {
                document.getElementById('goalInput').value = goal;
                DEFAULT_GOAL = parseInt(goal);
            }
            
            if(storedCarbs && storedProt && storedFat) {
                MACRO_CARBS = parseInt(storedCarbs);
                MACRO_PROTEIN = parseInt(storedProt);
                MACRO_FAT = parseInt(storedFat);
            }

            document.getElementById('pctCarbs').value = MACRO_CARBS;
            document.getElementById('pctProtein').value = MACRO_PROTEIN;
            document.getElementById('pctFat').value = MACRO_FAT;
        }

        function clearAllData() {
            if (confirm("⚠️ Möchtest du wirklich die komplette Historie und alle Einstellungen löschen?")) {
                localStorage.clear();
                location.reload();
            }
        }

        async function analyzeMeal() {
            const apiKey = localStorage.getItem('groq_api_key');
            if(!apiKey) {
                alert("🔑 Bitte tippe oben rechts auf das Rädchen ⚙️ und hinterlege deinen GROQ Cloud API Key!");
                openSettings();
                return;
            }

            const mealText = document.getElementById('mealInput').value.trim();
            if(!mealText) {
                alert("📝 Bitte gib ein, was du gegessen hast!");
                return;
            }

            // Zeit-Extraktion für den neuen Eintrag
            const timeInputVal = document.getElementById('mealTimeInput').value;
            const finalTime = timeInputVal || new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Analyse läuft...';

            const customDictionary = localStorage.getItem('food_dictionary') || '{}';
            const systemPrompt = `Du bist ein präziser Daten-Extraktor für Lebensmittel. Deine Aufgabe ist es, aus dem folgenden Text alle Lebensmittel zu extrahieren und deren Nährwerte basierend auf der genannten menge zu schätzen.

WICHTIGE BENUTZERREGELN (Lern-Modus):
Der Benutzer hat in der Vergangenheit manuelle Korrektionen vorgenommen. In der folgenden JSON-Liste siehst du Lebensmittel mit den Nährwerten für eine ganz bestimmte Basismenge ("amount").
Wenn das eingegebene Lebensmittel mit einem Eintrag aus dieser Liste übereinstimmt, verwende diesen Eintrag als absolut exakte Referenzbasis und berechne (skaliere) die neuen Nährwerte per Dreisatz exakt proportional auf die vom Benutzer aktuell geforderte Menge hoch oder runter!
${customDictionary}

Allgemeine Schätz-Regeln:
1. Wenn im Text keine spezifische Marke genannt wird, nimm hypothetische Standardwerte von deutschen Supermarkt-Eigenmarken (z.B. ja!, Gut & Günstig).
2. Eine Zahl vor dem Lebensmittel definiert die Menge (entweder in Gramm/Milliliter oder als Stück/Scheibe). 
3. Wenn keine Zahl genannt wird, nimm standardmäßig die Menge "1 Stück" oder eine übliche Einzelmenge an.
4. Berechne die Nährwerte (kcal, protein, carbs, fett) proportional für die gesamte angegebene Menge (NICHT pro 100g).

Ausgabe-Format:
Gib ausschließlich das reine JSON-Objekt zurück. Keine Erklärungen, kein Smalltalk, keine Markdown-Formatierung.

{
  "items": [
    {
      "name": "Magerquark",
      "brand": "Eigenmarke",
      "amount": "250g",
      "kcal": 170,
      "protein": 30,
      "carbs": 10,
      "fett": 1
    }
  ]
}`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "openai/gpt-oss-120b", 
                        response_format: { "type": "json_object" }, 
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: mealText }
                        ],
                        temperature: 0.0 
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    alert(`❌ Groq-Fehler (Status ${response.status}):\n\n${errorText}`);
                    return;
                }

                const data = await response.json();
                let aiResponseText = data.choices[0].message.content.trim();
                const parsedData = JSON.parse(aiResponseText);
                const parsedItems = parsedData.items || [];

                if(parsedItems.length === 0) {
                    alert("⚠️ Keine Lebensmittel erkannt. Bitte versuche es mit einer anderen Eingabe!");
                    return;
                }

                const dayData = getDayData();

                parsedItems.forEach(item => {
                    item.time = finalTime;
                    item.isEditing = false;
                    dayData.meals.push(item);
                });

                saveDayData(dayData);
                updateUI();
                document.getElementById('mealInput').value = '';

            } catch (error) {
                console.error("Fehler:", error);
                alert("❌ Fehler beim Verarbeiten: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-bolt"></i> Smart Scan';
            }
        }
    </script>
</body>
</html>
