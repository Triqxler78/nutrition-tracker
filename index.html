<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition App (Debug Mode)</title>
</head>
<body>

    <h1>Nutrition App (Mobile Debug)</h1>

    <section>
        <h3>1. API Einstellungen</h3>
        <input type="password" id="apiKeyInput" placeholder="Groq API Key hier einfügen">
        <button onclick="saveApiKey()">Key speichern</button>
    </section>

    <hr>

    <section>
        <h3>2. Tagesübersicht</h3>
        <p>Tagesziel: 2000 kcal (Standard)</p>
        <p>Konsumiert: <strong id="totalKcal">0</strong> kcal</p>
        <p>Verbleibend: <strong id="remainingKcal">2000</strong> kcal</p>
        <p>Eiweiß: <strong id="totalProtein">0</strong>g | Kohlenhydrate: <strong id="totalCarbs">0</strong>g | Fett: <strong id="totalFett">0</strong>g</p>
        <button onclick="clearDataManually()">Heute manuell zurücksetzen</button>
    </section>

    <hr>

    <section>
        <h3>3. Mahlzeit eingeben</h3>
        <textarea id="mealInput" rows="4" cols="40" placeholder="Z.B.: 1 Liter Eiweiß mit 2 Vollkorntoastbrot von Ja!"></textarea>
        <br><br>
        <button id="submitBtn" onclick="analyzeMeal()">Mahlzeit analysieren</button>
        <p id="loadingText" style="display:none; color: blue;">KI analysiert gerade... Bitte warten...</p>
    </section>

    <hr>

    <section>
        <h3>4. Heutige Zutaten & Mahlzeiten</h3>
        <ul id="logList">
            </ul>
    </section>

    <script>
        // Standard-Tagesziel
        const DAILY_GOAL = 2000;

        // Beim Laden der App: Daten wiederherstellen & Datum prüfen
        window.onload = function() {
            checkDailyReset();
            loadApiKey();
            updateUI();
        };

        // 1. API Key im LocalStorage speichern
        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value;
            localStorage.setItem('groq_api_key', key);
            alert('API Key gespeichert!');
        }

        function loadApiKey() {
            const key = localStorage.getItem('groq_api_key');
            if(key) {
                document.getElementById('apiKeyInput').value = key;
            }
        }

        // 2. Automatischer Reset jeden Tag
        function checkDailyReset() {
            const todayStr = new Date().toDateString(); // Z.B. "Sun Jun 14 2026"
            const lastSavedDate = localStorage.getItem('last_saved_date');

            if (lastSavedDate !== todayStr) {
                // Neuer Tag! Altes Log löschen
                localStorage.setItem('meal_log', JSON.stringify([]));
                localStorage.setItem('last_saved_date', todayStr);
            }
        }

        function clearDataManually() {
            if(confirm("Wirklich alle heutigen Daten löschen?")) {
                localStorage.setItem('meal_log', JSON.stringify([]));
                updateUI();
            }
        }

        // 3. UI Aktualisieren (Rechnen und Anzeigen)
        function updateUI() {
            const log = JSON.parse(localStorage.getItem('meal_log')) || [];
            let totalKcal = 0, totalProtein = 0, totalCarbs = 0, totalFett = 0;

            const logList = document.getElementById('logList');
            logList.innerHTML = ''; // Liste leeren

            log.forEach(item => {
                totalKcal += item.kcal;
                totalProtein += item.protein;
                totalCarbs += item.carbs;
                totalFett += item.fett;

                // Eintrag zur Liste hinzufügen
                const li = document.createElement('li');
                li.innerHTML = `[${item.time}] <b>${item.name}</b>: ${item.kcal} kcal (E:${item.protein}g, K:${item.carbs}g, F:${item.fett}g)`;
                logList.appendChild(li);
            });

            // Werte in die Übersicht schreiben
            document.getElementById('totalKcal').innerText = totalKcal;
            document.getElementById('remainingKcal').innerText = DAILY_GOAL - totalKcal;
            document.getElementById('totalProtein').innerText = totalProtein;
            document.getElementById('totalCarbs').innerText = totalCarbs;
            document.getElementById('totalFett').innerText = totalFett;
        }

        // 4. KI ANALYSE VIA GROQ API
        async function analyzeMeal() {
            const apiKey = localStorage.getItem('groq_api_key');
            if(!apiKey) {
                alert("Bitte gib zuerst einen Groq API Key ein!");
                return;
            }

            const mealText = document.getElementById('mealInput').value;
            if(!mealText.trim()) return;

            // Lade-Indikator anzeigen
            document.getElementById('loadingText').style.display = 'block';
            document.getElementById('submitBtn').disabled = true;

            // Uhrzeit festhalten
            const now = new Date();
            const currentTimeStr = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

            // System Prompt: Zwingt die KI, nur valides JSON zurückzugeben und deutsche Marken zu beachten
            const systemPrompt = `Du bist ein präziser Ernährungsberater für den deutschen Markt. 
            Analysiere den Text des Nutzers. Erkenne die Zutaten und schätze die Nährwerte (Kcal, Eiweiß, Kohlenhydrate, Fett) basierend auf typischen Werten deutscher Supermärkte (z.B. Ja!, Gut&Günstig, Milbona, Eigenmarken), falls angegeben.
            Antworte AUSSCHLIESSLICH mit einem validen JSON-Array. Keine Einleitung, kein Text drumherum.
            Format-Beispiel:
            [
              {"name": "1L Eiweiß (Milbona)", "kcal": 500, "protein": 110, "carbs": 10, "fett": 2},
              {"name": "2 Vollkorntoastbrot (Ja!)", "kcal": 140, "protein": 5, "carbs": 26, "fett": 2}
            ]`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-70b-versatile", // Ein extrem starkes und schlaues Modell
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: mealText }
                        ],
                        temperature: 0.1 // Niedrige Temperatur für faktenbasierte Daten
                    })
                });

                const data = await response.json();
                
                // Antwort-Text von der KI holen
                let aiResponseText = data.choices[0].message.content.trim();
                
                // Falls die KI wider Erwarten Markdown-Codeblöcke verwendet (```json ... ```), diese entfernen
                aiResponseText = aiResponseText.replace(/```json|```/g, '');

                // JSON parsen
                const parsedItems = JSON.parse(aiResponseText);

                // Bestehendes Log aus LocalStorage laden
                let currentLog = JSON.parse(localStorage.getItem('meal_log')) || [];

                // Jedes von der KI erkannte Item mit der aktuellen Uhrzeit versehen und abspeichern
                parsedItems.forEach(item => {
                    item.time = currentTimeStr;
                    currentLog.push(item);
                });

                // Im LocalStorage speichern und UI updaten
                localStorage.setItem('meal_log', JSON.stringify(currentLog));
                updateUI();
                
                // Textfeld leeren
                document.getElementById('mealInput').value = '';

            } catch (error) {
                console.error("Fehler bei der API oder beim Parsen:", error);
                alert("Fehler bei der Analyse. Schau in die Konsole (F12).");
            } finally {
                // Lade-Indikator ausblenden
                document.getElementById('loadingText').style.display = 'none';
                document.getElementById('submitBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
