<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition App (Debug v2)</title>
</head>
<body>

    <h1>Nutrition App (Mobile Debug v2)</h1>

    <section>
        <h3>1. API Einstellungen</h3>
        <input type="password" id="apiKeyInput" placeholder="Groq API Key (gsk_...)">
        <button onclick="saveApiKey()">Key speichern</button>
    </section>

    <hr>

    <section>
        <h3>2. Tagesübersicht</h3>
        <p>Tagesziel: 2000 kcal</p>
        <p>Konsumiert: <strong id="totalKcal">0</strong> kcal</p>
        <p>Verbleibend: <strong id="remainingKcal">2000</strong> kcal</p>
        <p>Eiweiß: <strong id="totalProtein">0</strong>g | Kohlenhydrate: <strong id="totalCarbs">0</strong>g | Fett: <strong id="totalFett">0</strong>g</p>
        <button onclick="clearDataManually()">Heute manuell zurücksetzen</button>
    </section>

    <hr>

    <section>
        <h3>3. Mahlzeit eingeben</h3>
        <textarea id="mealInput" rows="4" cols="40" placeholder="Z.B.: 1 Liter Eiweiß mit 2 Vollkorntoastbrot von Ja!"></textarea>
        <br><br>
        <button id="submitBtn" onclick="analyzeMeal()">Mahlzeit analysieren</button>
        <p id="loadingText" style="display:none; color: blue;">KI rechnet... Bitte warten...</p>
    </section>

    <hr>

    <section>
        <h3>4. Heutige Mahlzeiten</h3>
        <ul id="logList"></ul>
    </section>

    <script>
        const DAILY_GOAL = 2000;

        window.onload = function() {
            checkDailyReset();
            loadApiKey();
            updateUI();
        };

        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if(!key) {
                alert("Bitte einen Key eingeben.");
                return;
            }
            localStorage.setItem('groq_api_key', key);
            alert('API Key gespeichert!');
        }

        function loadApiKey() {
            const key = localStorage.getItem('groq_api_key');
            if(key) {
                document.getElementById('apiKeyInput').value = key;
            }
        }

        function checkDailyReset() {
            const todayStr = new Date().toDateString();
            const lastSavedDate = localStorage.getItem('last_saved_date');

            if (lastSavedDate !== todayStr) {
                localStorage.setItem('meal_log', JSON.stringify([]));
                localStorage.setItem('last_saved_date', todayStr);
            }
        }

        function clearDataManually() {
            if(confirm("Wirklich alle heutigen Daten löschen?")) {
                localStorage.setItem('meal_log', JSON.stringify([]));
                updateUI();
            }
        }

        function updateUI() {
            const log = JSON.parse(localStorage.getItem('meal_log')) || [];
            let totalKcal = 0, totalProtein = 0, totalCarbs = 0, totalFett = 0;
            const logList = document.getElementById('logList');
            logList.innerHTML = ''; 

            log.forEach(item => {
                totalKcal += Number(item.kcal || 0);
                totalProtein += Number(item.protein || 0);
                totalCarbs += Number(item.carbs || 0);
                totalFett += Number(item.fett || 0);

                const li = document.createElement('li');
                li.innerHTML = `[${item.time}] <b>${item.name}</b>: ${item.kcal} kcal (E:${item.protein}g, K:${item.carbs}g, F:${item.fett}g)`;
                logList.appendChild(li);
            });

            document.getElementById('totalKcal').innerText = totalKcal;
            document.getElementById('remainingKcal').innerText = DAILY_GOAL - totalKcal;
            document.getElementById('totalProtein').innerText = totalProtein;
            document.getElementById('totalCarbs').innerText = totalCarbs;
            document.getElementById('totalFett').innerText = totalFett;
        }

        async function analyzeMeal() {
            const apiKey = localStorage.getItem('groq_api_key');
            if(!apiKey) {
                alert("Bitte gib zuerst deinen Groq API Key oben ein und klicke auf Speichern!");
                return;
            }

            const mealText = document.getElementById('mealInput').value.trim();
            if(!mealText) return;

            document.getElementById('loadingText').style.display = 'block';
            document.getElementById('submitBtn').disabled = true;

            const now = new Date();
            const currentTimeStr = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

            const systemPrompt = `Du bist ein Ernährungsberater für den deutschen Markt. 
            Analysiere den Text und schätze die Nährwerte basierend auf typischen Werten deutscher Supermärkte (z.B. Ja!, Gut&Günstig).
            Antworte AUSSCHLIESSLICH mit einem validen JSON-Array. Kein Text drumherum.
            Format-Beispiel:
            [
              {"name": "1L Eiweiß (Milbona)", "kcal": 500, "protein": 110, "carbs": 10, "fett": 2}
            ]`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant", 
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: mealText }
                        ],
                        temperature: 0.1
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    alert(`Groq Server Fehler (Status ${response.status}):\n\n${errorText}`);
                    return;
                }

                const data = await response.json();
                
                if (!data.choices || !data.choices[0]) {
                    alert("Die KI hat keine choices geliefert.");
                    return;
                }

                let aiResponseText = data.choices[0].message.content.trim();
                aiResponseText = aiResponseText.replace(/```json|```/g, '');

                const parsedItems = JSON.parse(aiResponseText);
                let currentLog = JSON.parse(localStorage.getItem('meal_log')) || [];

                parsedItems.forEach(item => {
                    item.time = currentTimeStr;
                    currentLog.push(item);
                });

                localStorage.setItem('meal_log', JSON.stringify(currentLog));
                updateUI();
                document.getElementById('mealInput').value = '';

            } catch (error) {
                console.error("Fehler:", error);
                alert("Etwas ging schief: " + error.message);
            } finally {
                document.getElementById('loadingText').style.display = 'none';
                document.getElementById('submitBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
