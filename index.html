<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="Kalorie-Tracker mit KI Nährstoffanalyse">
    <title>Kalorie Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-light: #8b9eff;
            --danger: #f56565;
            --success: #48bb78;
            --light: #f7fafc;
            --lighter: #edf2f7;
            --text: #1a202c;
            --text-light: #718096;
            --border: #e2e8f0;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7ff 0%, #f8f9fa 100%);
            color: var(--text);
            overflow-x: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            padding: 16px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .header-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            color: white;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .header-date {
            font-size: 13px;
            opacity: 0.9;
        }

        .progress-wrapper {
            margin-top: 20px;
            margin-bottom: 12px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: rgba(255,255,255,0.8);
            transition: width 0.5s ease;
        }

        .kcal-large {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 2px;
            margin-top: 12px;
            margin-bottom: 16px;
        }

        .kcal-value {
            font-size: 48px;
            font-weight: 800;
        }

        .kcal-of {
            font-size: 14px;
            opacity: 0.8;
        }

        .kcal-goal {
            font-size: 24px;
            font-weight: 600;
        }

        .macros-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        .macro-box {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .macro-value {
            font-size: 18px;
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
        }

        .macro-label {
            font-size: 12px;
            opacity: 0.85;
            text-transform: uppercase;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-section {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .meal-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .meal-tab {
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--lighter);
            border: 1px solid var(--border);
            color: var(--text-light);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .meal-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        #foodInput {
            flex: 1;
            background: var(--light);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text);
            font-size: 15px;
            transition: all 0.2s ease;
        }

        #foodInput:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .history-section {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 12px;
        }

        .history-empty {
            text-align: center;
            padding: 32px 16px;
            color: var(--text-light);
            font-size: 14px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 12px;
            background: var(--light);
            border-radius: 10px;
            border-left: 4px solid var(--primary);
            gap: 10px;
        }

        .history-item-left {
            flex: 1;
            min-width: 0;
        }

        .meal-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
            border-radius: 6px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .history-item-food {
            font-weight: 600;
            color: var(--text);
            font-size: 14px;
            margin-bottom: 6px;
        }

        .history-item-meta {
            display: flex;
            gap: 8px;
            font-size: 11px;
            color: var(--text-light);
            flex-wrap: wrap;
        }

        .macro-tag {
            display: inline-block;
            padding: 2px 6px;
            background: var(--lighter);
            border-radius: 4px;
        }

        .macro-tag.protein {
            background: rgba(76, 140, 227, 0.1);
            color: #4c8ce3;
        }

        .macro-tag.carbs {
            background: rgba(237, 137, 54, 0.1);
            color: #ed8936;
        }

        .macro-tag.fat {
            background: rgba(240, 180, 41, 0.1);
            color: #f0b429;
        }

        .history-item-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .history-item-kcal {
            font-weight: 700;
            color: var(--primary);
            font-size: 16px;
        }

        .history-item-delete {
            background: rgba(245, 101, 101, 0.1);
            border: none;
            color: var(--danger);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .history-item-delete:active {
            background: rgba(245, 101, 101, 0.2);
            transform: scale(0.95);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 14px;
            box-shadow: var(--shadow);
            z-index: 2000;
            animation: toastSlide 0.3s ease;
        }

        .toast.success {
            background: rgba(72, 187, 120, 0.1);
            border-color: rgba(72, 187, 120, 0.3);
            color: #22543d;
        }

        .toast.error {
            background: rgba(245, 101, 101, 0.1);
            border-color: rgba(245, 101, 101, 0.3);
            color: var(--danger);
        }

        @keyframes toastSlide {
            from {
                transform: translateX(-50%) translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 24px;
            }

            .kcal-value {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-card">
            <div>
                <h1>🔥 Kalorie Tracker</h1>
                <div class="header-date" id="headerDate"></div>
            </div>

            <div class="progress-wrapper">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>

            <div class="kcal-large">
                <span class="kcal-value" id="totalKcal">0</span>
                <span class="kcal-of">/ <span class="kcal-goal" id="kcalGoal">2000</span></span>
            </div>

            <div class="macros-grid">
                <div class="macro-box">
                    <span class="macro-value" id="proteinValue">0g</span>
                    <span class="macro-label">Protein</span>
                </div>
                <div class="macro-box">
                    <span class="macro-value" id="carbsValue">0g</span>
                    <span class="macro-label">Kohlenhydrate</span>
                </div>
                <div class="macro-box">
                    <span class="macro-value" id="fatValue">0g</span>
                    <span class="macro-label">Fett</span>
                </div>
            </div>
        </div>

        <main>
            <div class="input-section">
                <div class="meal-tabs">
                    <button class="meal-tab active" data-meal="Frühstück">🌅 Frühstück</button>
                    <button class="meal-tab" data-meal="Mittagessen">🍽️ Mittagessen</button>
                    <button class="meal-tab" data-meal="Snack">🍿 Snack</button>
                    <button class="meal-tab" data-meal="Dinner">🌙 Dinner</button>
                </div>

                <div class="input-group">
                    <input 
                        type="text" 
                        id="foodInput" 
                        placeholder="z.B. 'Döner Kebab', 'Apfel mit Joghurt'" 
                        autocomplete="off"
                    >
                </div>
                <button class="btn btn-primary" id="submitBtn">
                    <span id="submitText">+ Analysieren</span>
                    <span id="submitLoader" class="loading" style="display: none;"></span>
                </button>
            </div>

            <div class="history-section">
                <div class="section-title">📋 Mahlzeiten heute</div>
                <div id="historyContainer" class="history-empty">Noch nichts hinzugefügt</div>
            </div>
        </main>
    </div>

    <script>
        // ==================== STATE ====================
        let currentMeal = 'Frühstück';
        let dailyData = [];
        let kcalGoal = 2000;

        // ==================== DOM ====================
        const elements = {
            headerDate: document.getElementById('headerDate'),
            totalKcal: document.getElementById('totalKcal'),
            proteinValue: document.getElementById('proteinValue'),
            carbsValue: document.getElementById('carbsValue'),
            fatValue: document.getElementById('fatValue'),
            progressFill: document.getElementById('progressFill'),
            foodInput: document.getElementById('foodInput'),
            submitBtn: document.getElementById('submitBtn'),
            submitText: document.getElementById('submitText'),
            submitLoader: document.getElementById('submitLoader'),
            mealTabs: document.querySelectorAll('.meal-tab'),
            historyContainer: document.getElementById('historyContainer')
        };

        // ==================== KI FUNKTION ====================
        async function analyzeFood(foodName) {
            const prompt = `Analysiere diese Nahrungsmittel/Gericht und gib die Nährstoffwerte für eine typische Portion zurück.

Nahrungsmittel: "${foodName}"

Antworte EXAKT im JSON Format (nur JSON, keine anderen Worte):
{
    "name": "Name des Gerichts",
    "portion": "typische Portionsgröße z.B. 100g, 150ml, 1 Portion",
    "kcal": Kilokalorien (Zahl),
    "protein": Protein in Gramm (Zahl),
    "carbs": Kohlenhydrate in Gramm (Zahl),
    "fat": Fett in Gramm (Zahl)
}`;

            try {
                // Verwende eine kostenlose Nutrition-API oder lokale Berechnung
                // Hier nutzen wir eine einfache heuristische KI-ähnliche Funktion
                // In echtem Einsatz würde man OpenAI/Claude/Gemini API verwenden
                
                const response = await fetch('https://api.cohere.com/v1/generate', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer <DEIN_API_KEY_HIER>',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'command',
                        prompt: prompt,
                        max_tokens: 200,
                        temperature: 0.7
                    })
                });

                if (!response.ok) {
                    // Fallback: Nutze lokale KI-ähnliche Funktion
                    return analyzeLocal(foodName);
                }

                const data = await response.json();
                const text = data.generations[0].text;
                const json = JSON.parse(text);
                return json;

            } catch (error) {
                // Fallback zu lokaler Analyse
                return analyzeLocal(foodName);
            }
        }

        // Lokale KI-ähnliche Analyse (heuristische Berechnung)
        function analyzeLocal(foodName) {
            const lower = foodName.toLowerCase();
            
            // Häufige Muster erkennen und Nährstoffe berechnen
            const patterns = {
                'apfel': { kcal: 52, protein: 0.3, carbs: 14, fat: 0.2, portion: '100g' },
                'banane': { kcal: 89, protein: 1.1, carbs: 23, fat: 0.3, portion: '100g' },
                'döner': { kcal: 500, protein: 25, carbs: 50, fat: 25, portion: '1 Portion' },
                'pizza': { kcal: 250, protein: 10, carbs: 32, fat: 9, portion: '1 Stück' },
                'burger': { kcal: 450, protein: 20, carbs: 45, fat: 20, portion: '1 Burger' },
                'joghurt': { kcal: 95, protein: 10, carbs: 7, fat: 1, portion: '150g' },
                'milch': { kcal: 130, protein: 6.5, carbs: 10, fat: 5, portion: '200ml' },
                'eier': { kcal: 78, protein: 6, carbs: 0.5, fat: 6, portion: '1 Ei' },
                'hähnchen': { kcal: 105, protein: 22, carbs: 0, fat: 1.5, portion: '100g' },
                'reis': { kcal: 130, protein: 2.7, carbs: 28, fat: 0.3, portion: '100g gekocht' },
                'pasta': { kcal: 131, protein: 5, carbs: 25, fat: 1.1, portion: '100g gekocht' },
                'brot': { kcal: 100, protein: 3.5, carbs: 18, fat: 1, portion: '1 Scheibe' },
                'salat': { kcal: 15, protein: 1.2, carbs: 3, fat: 0.2, portion: '100g' },
                'gemüse': { kcal: 30, protein: 1.5, carbs: 6, fat: 0.3, portion: '100g' }
            };

            // Suche nach Mustern im Eingabetext
            for (const [key, values] of Object.entries(patterns)) {
                if (lower.includes(key)) {
                    return {
                        name: foodName,
                        ...values
                    };
                }
            }

            // Default: Guesstimate für unbekannte Nahrungsmittel
            return {
                name: foodName,
                portion: '100g',
                kcal: 150,
                protein: 5,
                carbs: 20,
                fat: 5
            };
        }

        // ==================== EVENTS ====================
        elements.mealTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                elements.mealTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentMeal = tab.getAttribute('data-meal');
            });
        });

        elements.submitBtn.addEventListener('click', async () => {
            const input = elements.foodInput.value.trim();
            if (!input) return;

            elements.submitText.style.display = 'none';
            elements.submitLoader.style.display = 'inline-block';
            elements.submitBtn.disabled = true;

            const food = await analyzeFood(input);
            
            const entry = {
                name: food.name,
                meal: currentMeal,
                kcal: food.kcal,
                protein: food.protein,
                carbs: food.carbs,
                fat: food.fat,
                id: Date.now()
            };

            dailyData.push(entry);
            elements.foodInput.value = '';
            updateUI();
            showToast(`✅ ${food.name} hinzugefügt!`, 'success');

            elements.submitText.style.display = 'inline';
            elements.submitLoader.style.display = 'none';
            elements.submitBtn.disabled = false;
        });

        elements.foodInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                elements.submitBtn.click();
            }
        });

        // ==================== FUNCTIONS ====================
        function updateUI() {
            const totals = dailyData.reduce((acc, item) => ({
                kcal: acc.kcal + item.kcal,
                protein: acc.protein + item.protein,
                carbs: acc.carbs + item.carbs,
                fat: acc.fat + item.fat
            }), { kcal: 0, protein: 0, carbs: 0, fat: 0 });

            elements.totalKcal.textContent = Math.round(totals.kcal);
            elements.proteinValue.textContent = totals.protein.toFixed(1) + 'g';
            elements.carbsValue.textContent = totals.carbs.toFixed(1) + 'g';
            elements.fatValue.textContent = totals.fat.toFixed(1) + 'g';

            const progress = (totals.kcal / kcalGoal) * 100;
            elements.progressFill.style.width = Math.min(progress, 100) + '%';

            renderHistory();
            saveData();
        }

        function renderHistory() {
            if (dailyData.length === 0) {
                elements.historyContainer.innerHTML = '<div class="history-empty">Noch nichts hinzugefügt</div>';
                return;
            }

            const html = dailyData.map(item => `
                <div class="history-item">
                    <div class="history-item-left">
                        <div class="meal-badge">${item.meal}</div>
                        <div class="history-item-food">${item.name}</div>
                        <div class="history-item-meta">
                            <span class="macro-tag protein">P: ${item.protein.toFixed(1)}g</span>
                            <span class="macro-tag carbs">K: ${item.carbs.toFixed(1)}g</span>
                            <span class="macro-tag fat">F: ${item.fat.toFixed(1)}g</span>
                        </div>
                    </div>
                    <div class="history-item-right">
                        <div class="history-item-kcal">${Math.round(item.kcal)}</div>
                        <button class="history-item-delete" onclick="deleteEntry(${item.id})">🗑️</button>
                    </div>
                </div>
            `).join('');

            elements.historyContainer.innerHTML = `<div class="history-list">${html}</div>`;
        }

        function deleteEntry(id) {
            dailyData = dailyData.filter(item => item.id !== id);
            updateUI();
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function updateDate() {
            const today = new Date();
            const formatted = today.toLocaleDateString('de-DE', { 
                weekday: 'long', 
                day: '2-digit', 
                month: '2-digit'
            });
            elements.headerDate.textContent = formatted;
        }

        function saveData() {
            localStorage.setItem('dailyData_' + new Date().toDateString(), JSON.stringify(dailyData));
        }

        function loadData() {
            const key = 'dailyData_' + new Date().toDateString();
            const saved = localStorage.getItem(key);
            if (saved) {
                dailyData = JSON.parse(saved);
                updateUI();
            }
        }

        // INIT
        updateDate();
        loadData();
    </script>
</body>
</html>
